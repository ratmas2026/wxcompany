<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>新增/编辑企业信息 - Admin Panel</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/data.js"></script>
<script src="js/common.js"></script>
</head>
<body>
<div id="app"></div>

<script>
(async function() {
  Admin.init('company-info')
  await DataStore.init()

  const params = new URLSearchParams(window.location.search)
  const editId = params.get('id')
  const isEdit = !!editId

  let item = { id: null, name: '', legalPerson: '', phone: '', address: '', longitude: null, latitude: null, website: '', description: '', status: true }
  if (isEdit) {
    const existing = DataStore.getCompanyInfo(parseInt(editId))
    if (existing) item = { ...existing }
  }

  function render() {
    const html = `
      <div class="page-header">
        <h1>${isEdit ? '编辑企业信息' : '新增企业信息'}</h1>
        <button class="btn btn-secondary" onclick="window.history.back()">返回</button>
      </div>

      <div class="card">
        <form id="companyInfoForm" onsubmit="window.saveItem(event)">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">企业名称 *</label>
              <input class="form-input" id="ciName" value="${escapeHtml(item.name)}" placeholder="请输入企业名称" required>
            </div>
            <div class="form-group">
              <label class="form-label">法人名字</label>
              <input class="form-input" id="ciLegalPerson" value="${escapeHtml(item.legalPerson)}" placeholder="请输入法人名字">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">联系方式</label>
              <input class="form-input" id="ciPhone" value="${escapeHtml(item.phone)}" placeholder="请输入电话号码">
            </div>
            <div class="form-group">
              <label class="form-label">企业官网</label>
              <input class="form-input" id="ciWebsite" value="${escapeHtml(item.website)}" placeholder="https://">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">联系地址</label>
            <input class="form-input" id="ciAddress" value="${escapeHtml(item.address)}" placeholder="请输入企业地址">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">经度（选填，用于微信地图定位）</label>
              <input class="form-input" id="ciLongitude" type="number" step="any" value="${item.longitude || ''}" placeholder="如：116.397428">
            </div>
            <div class="form-group">
              <label class="form-label">纬度（选填，用于微信地图定位）</label>
              <input class="form-input" id="ciLatitude" type="number" step="any" value="${item.latitude || ''}" placeholder="如：39.90923">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">简介</label>
            <textarea class="form-textarea" id="ciDescription" placeholder="请输入企业简介">${escapeHtml(item.description)}</textarea>
          </div>

          <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:32px">
            <button type="button" class="btn btn-secondary" onclick="window.history.back()">取消</button>
            <button type="submit" class="btn btn-primary btn-lg">${isEdit ? '保存修改' : '创建企业'}</button>
          </div>
        </form>
      </div>
    `

    Admin.setPageContent(html)
  }

  function escapeHtml(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
  }

  window.saveItem = async function(e) {
    e.preventDefault()

    const nameVal = document.getElementById('ciName').value.trim()
    if (!nameVal) { Admin.showToast('请输入企业名称', 'error'); return }

    const lngVal = document.getElementById('ciLongitude').value.trim()
    const latVal = document.getElementById('ciLatitude').value.trim()

    const data = {
      id: item.id,
      name: nameVal,
      legalPerson: document.getElementById('ciLegalPerson').value.trim(),
      phone: document.getElementById('ciPhone').value.trim(),
      address: document.getElementById('ciAddress').value.trim(),
      longitude: lngVal ? parseFloat(lngVal) : null,
      latitude: latVal ? parseFloat(latVal) : null,
      website: document.getElementById('ciWebsite').value.trim(),
      description: document.getElementById('ciDescription').value.trim(),
      status: item.status !== undefined ? item.status : true
    }

    await DataStore.saveCompanyInfo(data)
    Admin.showToast(isEdit ? '企业信息已更新' : '企业已创建', 'success')

    setTimeout(function() {
      window.location.href = 'company-info.html'
    }, 800)
  }

  window.onGlobalSearch = function() {}

  render()
})()
</script>
</body>
</html>
