<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>编辑企业项目 - Admin Panel</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/data.js"></script>
<script src="js/common.js"></script>
</head>
<body>
<div id="app"></div>

<script>
(async function() {
  Admin.init('projects')
  await DataStore.init()

  const params = new URLSearchParams(window.location.search)
  const editId = params.get('id') ? parseInt(params.get('id')) : null
  const isEdit = !!editId

  let project = {
    id: null, name: '', address: '', location: '', year: '',
    scale: '', period: '', desc: '',
    highlights: [], results: [], tags: [],
    image: '', images: []
  }
  let pendingImage = ''
  let pendingImages = []

  if (isEdit) {
    const existing = DataStore.getProject(editId)
    if (existing) {
      project = { ...project, ...existing }
      project.highlights = [...(existing.highlights || [])]
      project.results = [...(existing.results || [])]
      project.tags = [...(existing.tags || [])]
      project.images = [...(existing.images || [])]
    }
  }
  pendingImage = project.image || ''
  pendingImages = [...(project.images || [])]

  function render() {
    const hlHTML = renderHighlights()
    const resHTML = renderResults()
    const multiImageHTML = renderMultiImages()

    const html = `
      <div class="page-header">
        <h1>${isEdit ? '编辑企业项目' : '新增企业项目'}</h1>
        <button class="btn btn-secondary" onclick="window.location.href='projects.html'">← 返回</button>
      </div>

      <div class="card">
        <div class="card-header"><h3>基本信息</h3></div>
        <div class="card-body">
          <div class="form-group">
            <label class="form-label">项目名称 <span style="color:#e53e3e;">*</span></label>
            <input class="form-input" id="field_name" value="${escapeHtml(project.name)}" placeholder="请输入项目名称">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">地址</label>
              <input class="form-input" id="field_address" value="${escapeHtml(project.address || '')}" placeholder="详细地址">
            </div>
            <div class="form-group">
              <label class="form-label">位置</label>
              <input class="form-input" id="field_location" value="${escapeHtml(project.location || '')}" placeholder="如 深圳、新加坡">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">年份</label>
              <input class="form-input" id="field_year" value="${escapeHtml(project.year || '')}" placeholder="如 2024">
            </div>
            <div class="form-group">
              <label class="form-label">周期</label>
              <input class="form-input" id="field_period" value="${escapeHtml(project.period || '')}" placeholder="如 2021年6月 - 2023年12月">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">规模</label>
            <input class="form-input" id="field_scale" value="${escapeHtml(project.scale || '')}" placeholder="如 总建筑面积 85,000㎡">
          </div>
          <div class="form-group">
            <label class="form-label">描述</label>
            <textarea class="form-textarea" id="field_desc" placeholder="请输入项目描述..." rows="3">${escapeHtml(project.desc || '')}</textarea>
          </div>
          <div class="form-group">
            <label class="form-label">标签（逗号分隔）</label>
            <input class="form-input" id="field_tags" value="${escapeHtml((project.tags || []).join(', '))}" placeholder="如 绿色建筑, 城市更新, 能源A+">
          </div>
        </div>
      </div>

      ${hlHTML}
      ${resHTML}

      <div class="card" style="margin-top:24px;">
        <div class="card-header">
          <h3>项目主图</h3>
        </div>
        <div class="card-body">
          <div class="image-upload-area">
            ${pendingImage
              ? `<div class="img-preview-item"><img src="${pendingImage}" class="img-preview-thumb" /><button class="img-remove-btn" onclick="window.removeMainImage()" title="移除">✕</button></div>`
              : '<span style="color:#a0aec0;font-size:14px;">尚未上传主图</span>'}
            <button class="btn btn-outline btn-sm" style="margin-top:8px;display:block;" onclick="document.getElementById('mainImageInput').click()">
              ${pendingImage ? '更换主图' : '点击上传主图'}
            </button>
            <input type="file" id="mainImageInput" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none" onchange="window.onMainImageSelected(this)">
          </div>
        </div>
      </div>

      <div class="card" style="margin-top:24px;">
        <div class="card-header">
          <h3>项目图集</h3>
          <span style="color:#718096;font-size:13px;">支持上传多张图片</span>
        </div>
        <div class="card-body">
          <div class="image-upload-area">
            <div class="img-preview-grid">${multiImageHTML}</div>
            <button class="btn btn-outline" onclick="document.getElementById('multiImageInput').click()">
              ${pendingImages.length > 0 ? '+ 添加图片' : '点击上传图片'}
            </button>
            <input type="file" id="multiImageInput" accept="image/jpeg,image/png,image/gif,image/webp" multiple style="display:none" onchange="window.onMultiImagesSelected(this)">
          </div>
        </div>
      </div>

      <div style="margin-top:32px;display:flex;gap:12px;justify-content:center;">
        <button class="btn btn-secondary" onclick="window.location.href='projects.html'">取消</button>
        <button class="btn btn-primary btn-lg" onclick="window.saveAll()">保存</button>
      </div>
    `

    Admin.setPageContent(html)
  }

  function renderHighlights() {
    const items = (project.highlights || []).map((h, idx) => `
      <div class="sub-item-row">
        <input class="form-input hl-item" data-idx="${idx}" value="${escapeHtml(h)}" placeholder="项目亮点 ${idx + 1}">
        <button class="btn btn-danger btn-sm" onclick="window.removeHighlight(${idx})">✕</button>
      </div>
    `).join('')

    return `
      <div class="card" style="margin-top:24px;">
        <div class="card-header"><h3>项目亮点</h3></div>
        <div class="card-body">
          <div id="highlightsContainer">${items || '<p style="color:#a0aec0;font-size:14px;">暂无，点击下方按钮添加</p>'}</div>
          <button class="btn btn-outline btn-sm" style="margin-top:12px;" onclick="window.addHighlight()">+ 添加亮点</button>
        </div>
      </div>
    `
  }

  function renderResults() {
    const items = (project.results || []).map((r, idx) => `
      <div class="sub-item-row">
        <input class="form-input res-item" data-idx="${idx}" value="${escapeHtml(r)}" placeholder="项目成果 ${idx + 1}">
        <button class="btn btn-danger btn-sm" onclick="window.removeResult(${idx})">✕</button>
      </div>
    `).join('')

    return `
      <div class="card" style="margin-top:24px;">
        <div class="card-header"><h3>项目成果</h3></div>
        <div class="card-body">
          <div id="resultsContainer">${items || '<p style="color:#a0aec0;font-size:14px;">暂无，点击下方按钮添加</p>'}</div>
          <button class="btn btn-outline btn-sm" style="margin-top:12px;" onclick="window.addResult()">+ 添加成果</button>
        </div>
      </div>
    `
  }

  function renderMultiImages() {
    return pendingImages.map((url, idx) => `
      <div class="img-preview-item">
        <img src="${url}" class="img-preview-thumb" />
        <button class="img-remove-btn" onclick="window.removeMultiImage(${idx})" title="移除">✕</button>
      </div>
    `).join('')
  }

  function escapeHtml(str) {
    return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
  }

  function syncFieldsToProject() {
    const nameEl = document.getElementById('field_name')
    if (nameEl) project.name = nameEl.value.trim()
    const addressEl = document.getElementById('field_address')
    if (addressEl) project.address = addressEl.value.trim()
    const locationEl = document.getElementById('field_location')
    if (locationEl) project.location = locationEl.value.trim()
    const yearEl = document.getElementById('field_year')
    if (yearEl) project.year = yearEl.value.trim()
    const scaleEl = document.getElementById('field_scale')
    if (scaleEl) project.scale = scaleEl.value.trim()
    const periodEl = document.getElementById('field_period')
    if (periodEl) project.period = periodEl.value.trim()
    const descEl = document.getElementById('field_desc')
    if (descEl) project.desc = descEl.value
    const tagsEl = document.getElementById('field_tags')
    if (tagsEl) project.tags = tagsEl.value.split(',').map(s => s.trim()).filter(Boolean)

    project.highlights = []
    document.querySelectorAll('.hl-item').forEach(el => {
      const idx = parseInt(el.dataset.idx)
      project.highlights[idx] = el.value.trim()
    })
    project.highlights = project.highlights.filter(Boolean)

    project.results = []
    document.querySelectorAll('.res-item').forEach(el => {
      const idx = parseInt(el.dataset.idx)
      project.results[idx] = el.value.trim()
    })
    project.results = project.results.filter(Boolean)
  }

  function collectAllFields() {
    syncFieldsToProject()
    return {
      id: project.id,
      name: project.name,
      address: project.address,
      location: project.location,
      year: project.year,
      scale: project.scale,
      period: project.period,
      desc: project.desc,
      tags: project.tags,
      highlights: project.highlights,
      results: project.results,
      image: pendingImage,
      images: pendingImages
    }
  }

  // Highlights
  window.addHighlight = function() {
    syncFieldsToProject()
    project.highlights.push('')
    render()
  }
  window.removeHighlight = function(idx) {
    syncFieldsToProject()
    project.highlights.splice(idx, 1)
    render()
  }

  // Results
  window.addResult = function() {
    syncFieldsToProject()
    project.results.push('')
    render()
  }
  window.removeResult = function(idx) {
    syncFieldsToProject()
    project.results.splice(idx, 1)
    render()
  }

  // Main image
  window.onMainImageSelected = async function(input) {
    const file = input.files[0]
    if (!file) return
    if (file.size > 5 * 1048576) { Admin.showToast('图片不能超过 5MB', 'error'); input.value = ''; return }
    syncFieldsToProject()
    Admin.showToast('正在上传主图...', 'info')
    try {
      const url = await DataStore.uploadProjectImage(file)
      pendingImage = url
      Admin.showToast('主图上传成功', 'success')
      input.value = ''
      render()
    } catch (err) {
      Admin.showToast('主图上传失败: ' + err.message, 'error')
    }
  }
  window.removeMainImage = function() {
    syncFieldsToProject()
    pendingImage = ''
    render()
  }

  // Multi images
  window.onMultiImagesSelected = async function(input) {
    const files = Array.from(input.files)
    if (!files.length) return
    syncFieldsToProject()
    for (const file of files) {
      if (file.size > 5 * 1048576) { Admin.showToast('图片 ' + file.name + ' 超过5MB，已跳过', 'error'); continue }
      try {
        Admin.showToast('正在上传 ' + file.name + ' ...', 'info')
        const url = await DataStore.uploadProjectImage(file)
        pendingImages.push(url)
        Admin.showToast(file.name + ' 上传成功', 'success')
      } catch (err) {
        Admin.showToast(file.name + ' 上传失败: ' + err.message, 'error')
      }
    }
    input.value = ''
    render()
  }
  window.removeMultiImage = function(idx) {
    syncFieldsToProject()
    pendingImages.splice(idx, 1)
    render()
  }

  window.saveAll = async function() {
    const data = collectAllFields()
    if (!data.name) { Admin.showToast('请输入项目名称', 'error'); return }

    try {
      await DataStore.saveProject(data)
      Admin.showToast(isEdit ? '已更新' : '已创建', 'success')
      setTimeout(() => { window.location.href = 'projects.html' }, 800)
    } catch (err) {
      Admin.showToast('保存失败: ' + err.message, 'error')
    }
  }

  window.onGlobalSearch = function() {}

  render()
})()
</script>

<style>
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #e2e8f0; }
.card-header h3 { font-size: 16px; font-weight: 700; color: #1a202c; }
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 8px; }
.form-input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; color: #1a202c; background: #fff; box-sizing: border-box; }
.form-input:focus { outline: none; border-color: #3a5f94; box-shadow: 0 0 0 3px rgba(58,95,148,0.1); }
.form-textarea { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; line-height: 1.7; color: #1a202c; background: #fff; resize: vertical; font-family: inherit; box-sizing: border-box; }
.form-textarea:focus { outline: none; border-color: #3a5f94; box-shadow: 0 0 0 3px rgba(58,95,148,0.1); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.sub-item-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.sub-item-row .form-input { flex: 1; }
.image-upload-area { }
.img-preview-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
.img-preview-item { position: relative; width: 140px; height: 140px; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0; display: inline-block; margin-right: 12px; margin-bottom: 12px; }
.img-preview-thumb { width: 100%; height: 100%; object-fit: cover; }
.img-remove-btn { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; border-radius: 50%; border: none; background: rgba(0,0,0,0.6); color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.btn-lg { padding: 14px 48px; font-size: 16px; font-weight: 600; }
</style>
</body>
</html>
