<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>名片模板 - Admin Panel</title>
<link rel="stylesheet" href="css/common.css"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="js/data.js"></script>
<script src="js/common.js"></script>
</head>
<body>
<div id="app"></div>

<script>
(async function() {
  Admin.init('card-template')
  await DataStore.init()

  // State
  let templates = []
  let editingTpl = null          // currently editing template object
  let selectedFieldIndices = []  // multi-select: array of indices into editingTpl.fields
  let dragFieldIdx = -1
  let dragStartX = 0, dragStartY = 0
  let fieldStartX = 0, fieldStartY = 0
  let snapGuideLines = []        // {axis:'x'|'y', pos:Number} for alignment guide rendering
  let rafId = null               // requestAnimationFrame id for drag throttling
  let guideTimeoutId = null      // setTimeout id for guide line fade-out

  const SCALE = 1.0     // rpx to px scale (1:1)

  // Dynamic canvas size (replaces old canvasW/canvasH constants)
  let canvasW = 360
  let canvasH = 216
  let orientation = 'landscape'  // 'landscape' | 'portrait'
  let preset = 'business-card'   // preset key

  // History for undo/redo
  let historyStack = []
  let historyIndex = -1
  const MAX_HISTORY = 50

  function pushHistory() {
    if (!editingTpl || !editingTpl.fields) return
    // Trim forward history if we're not at the end
    if (historyIndex < historyStack.length - 1) {
      historyStack = historyStack.slice(0, historyIndex + 1)
    }
    const snapshot = {
      fields: JSON.parse(JSON.stringify(editingTpl.fields)),
      background: editingTpl.background,
      theme: editingTpl.theme,
      colors: JSON.parse(JSON.stringify(editingTpl.colors || {}))
    }
    historyStack.push(snapshot)
    if (historyStack.length > MAX_HISTORY) historyStack.shift()
    historyIndex = historyStack.length - 1
  }

  function restoreSnapshot(snapshot) {
    editingTpl.fields = JSON.parse(JSON.stringify(snapshot.fields))
    editingTpl.background = snapshot.background
    editingTpl.theme = snapshot.theme
    if (snapshot.colors) editingTpl.colors = JSON.parse(JSON.stringify(snapshot.colors))
  }

  window.undo = function() {
    if (historyIndex <= 0 || historyStack.length === 0) return
    historyIndex--
    restoreSnapshot(historyStack[historyIndex])
    renderEditor()
  }

  window.redo = function() {
    if (historyIndex >= historyStack.length - 1) return
    historyIndex++
    restoreSnapshot(historyStack[historyIndex])
    renderEditor()
  }

  // Grid state
  let gridCols = 10
  let gridRows = 6
  let showGrid = true

  const PRESETS = {
    'business-card':   { w: 360, h: 216, label: '名片 (横版)' },
    'business-card-v': { w: 216, h: 360, label: '名片 (竖版)' },
    'poster':          { w: 540, h: 756, label: '海报' },
    'phone':           { w: 375, h: 667, label: '手机屏' },
    'a4':              { w: 595, h: 842, label: 'A4' },
    'wechat':          { w: 540, h: 360, label: '微信分享图' },
    'custom':          { w: 360, h: 216, label: '自定义' }
  }

  function applyCanvasSize(w, h, newOrientation, newPreset) {
    const oldW = canvasW, oldH = canvasH
    canvasW = w; canvasH = h
    orientation = newOrientation || orientation
    preset = newPreset || 'custom'
    if (editingTpl && editingTpl.fields && (oldW !== w || oldH !== h)) {
      const sx = w / oldW, sy = h / oldH
      editingTpl.fields.forEach(f => {
        f.x = Math.round(f.x * sx)
        f.y = Math.round(f.y * sy)
        f.fontSize = Math.round(f.fontSize * Math.min(sx, sy))
        if (f.width) f.width = Math.round(f.width * sx)
      })
    }
  }

  // ---- Theme System ----
  const THEMES = {
    'cyberpunk': {
      name: '赛博朋克', bg: '#000000', primaryColor: '#ff4d4d', secondaryColor: '#ff6666',
      fontFamily: 'Orbitron', decorations: ['scanline', 'hex', 'diamond', 'circle'],
      textShadow: '0 0 2px #ff0000, 0 0 5px rgba(255, 0, 0, 0.8), 0 0 10px rgba(255, 0, 0, 0.4)'
    },
    'business': {
      name: '商务风', bg: '#ffffff', primaryColor: '#1a3a5c', secondaryColor: '#4a6a8c',
      fontFamily: '微软雅黑', decorations: [], textShadow: 'none'
    },
    'minimal': {
      name: '日式极简', bg: '#f5f5f0', primaryColor: '#2c2c2c', secondaryColor: '#888888',
      fontFamily: '思源黑体', decorations: [], textShadow: 'none'
    },
    'pastoral': {
      name: '田园风', bg: '#f0f5e8', primaryColor: '#4a6741', secondaryColor: '#8b9d6b',
      fontFamily: '宋体', decorations: [], textShadow: 'none'
    },
    'tech': {
      name: '科技风', bg: '#0a0e27', primaryColor: '#00d4ff', secondaryColor: '#7b68ee',
      fontFamily: 'Helvetica', decorations: ['scanline'], textShadow: '0 0 8px rgba(0,212,255,0.5)'
    },
    'guochao': {
      name: '国潮风', bg: '#cc2936', primaryColor: '#ffd700', secondaryColor: '#ffffff',
      fontFamily: '宋体', decorations: [], textShadow: '0 1px 2px rgba(0,0,0,0.3)'
    },
    'bw': {
      name: '极简黑白', bg: '#ffffff', primaryColor: '#000000', secondaryColor: '#666666',
      fontFamily: 'Helvetica', decorations: [], textShadow: 'none'
    }
  }

  window.applyTheme = function(themeKey) {
    const theme = THEMES[themeKey]
    if (!theme || !editingTpl || !editingTpl.fields) return
    pushHistory()
    editingTpl.background = theme.bg
    editingTpl.theme = themeKey
    editingTpl.colors = { primary: theme.primaryColor, secondary: theme.secondaryColor }
    const fields = editingTpl.fields
    // Apply primary to first half of fields, secondary to rest
    const mid = Math.ceil(fields.length / 2)
    fields.forEach((f, i) => {
      f.color = i < mid ? theme.primaryColor : theme.secondaryColor
      f.fontFamily = theme.fontFamily
    })
    autoAdjustTextColorsQuiet()
    renderEditor()
    Admin.showToast('已应用主题: ' + theme.name, 'success')
  }

  function autoAdjustTextColorsQuiet() {
    if (!editingTpl || !editingTpl.fields) return
    const bgBright = getBrightness(editingTpl.background || '#0A0B10')
    editingTpl.fields.forEach(f => {
      if (!f.visible) return
      const fBright = getBrightness(f.color || '#ffffff')
      if (Math.abs(bgBright - fBright) < 60) {
        f.color = bgBright < 128 ? '#ffffff' : '#1a1a1a'
      }
    })
  }

  // Default 赛博科技名片 layout (Orbitron + Red/Crimson — Neon Synth Labs)
  const DEFAULT_FIELDS = [
    { key: 'company',  label: '公司名称', x: 20, y: 32,  fontSize: 22, color: '#ff4d4d', fontFamily: 'Orbitron', fontWeight: '900', textAlign: 'center', width: 320, visible: true, opacity: 0.95, letterSpacing: 3 },
    { key: 'name',     label: '姓名',     x: 40, y: 82,  fontSize: 18, color: '#ff4d4d', fontFamily: 'Orbitron', fontWeight: '700', textAlign: 'center', width: 280, visible: true, letterSpacing: 1 },
    { key: 'title',    label: '职务',     x: 40, y: 110, fontSize: 12, color: '#ff6666', fontFamily: 'Orbitron', fontWeight: '400', textAlign: 'center', width: 280, visible: true, letterSpacing: 2 },
    { key: 'address',  label: '地址',     x: 16, y: 162, fontSize: 10, color: '#ff4d4d', fontFamily: 'Orbitron', fontWeight: '400', textAlign: 'left',   width: 160, visible: true, opacity: 0.85 },
    { key: 'phone',    label: '手机',     x: 195,y: 162, fontSize: 10, color: '#ff4d4d', fontFamily: 'Orbitron', fontWeight: '400', textAlign: 'right',  width: 145, visible: true, opacity: 0.85 },
    { key: 'email',    label: '邮箱',     x: 195,y: 182, fontSize: 10, color: '#ff4d4d', fontFamily: 'Orbitron', fontWeight: '400', textAlign: 'right',  width: 145, visible: true, opacity: 0.85 }
  ]

  const COLORS = ['#ff4d4d', '#ff6666', '#FFFFFF', '#00F0FF', '#B026FF', '#000000', '#ffd700', '#ff8800']

  function loadTemplates() {
    templates = DataStore.getCardTemplates()
  }

  // ---- Render ----
  function render() {
    loadTemplates()
    if (editingTpl) {
      renderEditor()
      return
    }
    renderList()
  }

  function renderList() {
    const cardsHtml = templates.length === 0
      ? '<div class="empty-state"><div class="empty-icon">🎨</div><p>暂无模板</p><p style="font-size:12px">点击右上角"添加模板"创建</p></div>'
      : templates.map(tpl => {
          const bg = tpl.background || '#0A0B0D'
          const previewHtml = renderPreviewCanvas(tpl, 360, 216)
          return `
            <div class="media-card">
              <div class="media-thumb" style="background:${bg};position:relative;overflow:hidden;">
                <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
                  <div style="position:relative;width:280px;height:168px;transform:scale(0.78);transform-origin:center center">
                    ${previewHtml}
                  </div>
                </div>
              </div>
              <div class="media-body">
                <div class="media-title">${escHtml(tpl.name)}</div>
                <div class="media-meta">
                  <span>📋 ${(tpl.fields || []).length} 个字段</span>
                  <span>📅 ${tpl.createdAt || ''}</span>
                </div>
                <div class="media-actions">
                  <button class="btn btn-outline btn-sm" onclick="window.editTemplate(${tpl.id})">✏️ 编辑</button>
                  <button class="btn btn-outline btn-sm" onclick="window.duplicateTemplate(${tpl.id})">📋 复制</button>
                  <button class="btn btn-sm" style="color:#e53e3e;border:1px solid #e53e3e;background:transparent" onclick="window.deleteTemplate(${tpl.id})">🗑 删除</button>
                </div>
              </div>
            </div>`
        }).join('')

    const html = `
      <div class="page-header">
        <h1>名片模板</h1>
        <button class="btn btn-primary" onclick="window.addTemplate()">+ 添加模板</button>
      </div>
      <div class="card-grid">
        ${cardsHtml}
      </div>
    `
    Admin.setPageContent(html)
  }

  function renderPreviewCanvas(tpl, w, h) {
    if (!tpl || !tpl.fields) return ''
    const scaleX = w / canvasW
    const scaleY = h / canvasH
    const lines = (tpl.fields || []).filter(f => f.visible !== false).map(f => {
      const left = f.x * SCALE * scaleX
      const top = f.y * SCALE * scaleY
      const fs = Math.round(f.fontSize * scaleX)
      const ff = f.fontFamily || 'Share Tech Mono'
      const ta = f.textAlign || 'left'
      const fw = f.width ? f.width * scaleX : null
      const fweight = (f.fontWeight && f.fontWeight !== 'normal') ? f.fontWeight : 'normal'
      const lh = f.lineHeight || 1.2
      const ls = f.letterSpacing || 0
      const op = f.opacity != null ? f.opacity : 1
      const rt = f.rotation || 0
      const rotStyle = rt ? `transform:rotate(${rt}deg);transform-origin:center center;` : ''
      return `<div style="position:absolute;left:${left}px;top:${top}px;font-size:${fs}px;color:${escHtml(f.color || '#717777')};font-family:${escHtml(ff)},monospace;white-space:nowrap;line-height:${lh};letter-spacing:${ls}px;font-weight:${fweight};opacity:${op};${rotStyle}text-shadow:0 0 2px #ff0000,0 0 5px rgba(255,0,0,0.8),0 0 10px rgba(255,0,0,0.4);text-align:${escHtml(ta)};${fw ? 'width:'+Math.round(fw)+'px' : ''}">${escHtml(f.label)}</div>`
    }).join('')
    return lines
  }

  // ---- Editor ----
  function renderEditor() {
    const tpl = editingTpl
    const bg = tpl.background || '#030909'
    const fields = tpl.fields || []

    // Build field elements for canvas
    const fieldEls = fields.map((f, idx) => {
      if (!f.visible) return ''
      const left = f.x * SCALE
      const top = f.y * SCALE
      const selected = selectedFieldIndices.includes(idx)
      const ta = f.textAlign || 'left'
      const fieldW = f.width || null
      const fWeight = (f.fontWeight && f.fontWeight !== 'normal') ? f.fontWeight : null
      const lh = f.lineHeight || 1.2
      const ls = f.letterSpacing || 0
      const op = f.opacity != null ? f.opacity : 1
      const rt = f.rotation || 0
      const rotStyle = rt ? `transform:rotate(${rt}deg);transform-origin:center center;` : ''
      return `<div class="tpl-field ${selected ? 'tpl-field-selected' : ''}"
        style="left:${left}px;top:${top}px;font-size:${f.fontSize * SCALE}px;color:${escHtml(f.color)};font-family:${escHtml(f.fontFamily || 'Share Tech Mono')},monospace;text-align:${escHtml(ta)};${fieldW ? 'width:'+fieldW+'px' : ''}font-weight:${fWeight||'normal'};line-height:${lh};letter-spacing:${ls}px;opacity:${op};${rotStyle}"
        data-idx="${idx}"
        onpointerdown="window.fieldMouseDown(event, ${idx})">${escHtml(f.label)}</div>`
    }).join('')

    // Property panel for selected field (single selection only)
    let propPanel = ''
    if (selectedFieldIndices.length === 1) {
      const sf = fields[selectedFieldIndices[0]]
      const colorBtns = COLORS.map(c =>
        `<button class="color-swatch ${sf.color === c ? 'color-swatch-active' : ''}"
          style="background:${c}" title="${c}"
          onclick="window.setFieldProp('color','${c}')"></button>`
      ).join('')
      const fontFamilies = ['Share Tech Mono', '微软雅黑', '思源黑体', '宋体', 'Helvetica', 'Arial', 'Courier New', 'Georgia']
      const fontOpts = fontFamilies.map(ff => `<option value="${ff}" ${(sf.fontFamily||'Share Tech Mono')===ff?'selected':''}>${ff}</option>`).join('')
      propPanel = `
        <div class="card" style="margin-top:16px">
          <h3 style="margin:0 0 12px;font-size:15px">✏️ 属性：${escHtml(sf.label)}</h3>
          ${sf.isCustom ? `
          <div class="form-group">
            <label class="form-label">文本内容</label>
            <input type="text" class="form-input" value="${escHtml(sf.label)}"
              oninput="editingTpl.fields[${selectedFieldIndices[0]}].label = this.value; renderEditor()"
              placeholder="输入文本内容">
          </div>` : ''}
          <div class="form-group">
            <label class="form-label">字体</label>
            <select style="width:100%;padding:6px 8px;border-radius:6px;border:1px solid #dce3ef;font-size:12px"
              onchange="window.setFieldProp('fontFamily', this.value)">${fontOpts}</select>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
              <label class="form-label">字号 <span style="color:#718096">${sf.fontSize}rpx</span></label>
              <input type="range" min="10" max="72" value="${sf.fontSize}" style="width:100%"
                oninput="window.setFieldProp('fontSize', parseInt(this.value))">
            </div>
            <div class="form-group">
              <label class="form-label">粗细</label>
              <select style="width:100%;padding:6px 8px;border-radius:6px;border:1px solid #dce3ef;font-size:12px"
                onchange="window.setFieldProp('fontWeight', this.value)">
                <option value="normal" ${(sf.fontWeight||'normal')==='normal'?'selected':''}>常规</option>
                <option value="bold" ${sf.fontWeight==='bold'?'selected':''}>粗体</option>
                <option value="200" ${sf.fontWeight==='200'?'selected':''}>细体 200</option>
                <option value="500" ${sf.fontWeight==='500'?'selected':''}>中等 500</option>
                <option value="700" ${sf.fontWeight==='700'?'selected':''}>加粗 700</option>
                <option value="900" ${sf.fontWeight==='900'?'selected':''}>超粗 900</option>
              </select>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
              <label class="form-label">行高 <span style="color:#718096">${sf.lineHeight || 1.2}</span></label>
              <input type="range" min="0.8" max="3" step="0.1" value="${sf.lineHeight || 1.2}" style="width:100%"
                oninput="window.setFieldProp('lineHeight', parseFloat(this.value))">
            </div>
            <div class="form-group">
              <label class="form-label">字间距 <span style="color:#718096">${sf.letterSpacing || 0}px</span></label>
              <input type="range" min="-2" max="10" step="0.5" value="${sf.letterSpacing || 0}" style="width:100%"
                oninput="window.setFieldProp('letterSpacing', parseFloat(this.value))">
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
              <label class="form-label">透明度 <span style="color:#718096">${sf.opacity != null ? sf.opacity : 1}</span></label>
              <input type="range" min="0.2" max="1" step="0.05" value="${sf.opacity != null ? sf.opacity : 1}" style="width:100%"
                oninput="window.setFieldProp('opacity', parseFloat(this.value))">
            </div>
            <div class="form-group">
              <label class="form-label">旋转 <span style="color:#718096">${sf.rotation || 0}°</span></label>
              <input type="range" min="-180" max="180" step="1" value="${sf.rotation || 0}" style="width:100%"
                oninput="window.setFieldProp('rotation', parseInt(this.value))">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">颜色</label>
            <div style="display:flex;gap:6px;flex-wrap:wrap">${colorBtns}</div>
          </div>
          <div class="form-group">
            <label class="form-label">对齐</label>
            <select style="width:100%;padding:6px 8px;border-radius:6px;border:1px solid #dce3ef"
              onchange="window.setFieldProp('textAlign', this.value)">
              <option value="left" ${(sf.textAlign||'left')==='left'?'selected':''}>左对齐</option>
              <option value="center" ${sf.textAlign==='center'?'selected':''}>居中</option>
              <option value="right" ${sf.textAlign==='right'?'selected':''}>右对齐</option>
            </select>
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:12px">
            <label class="switch">
              <input type="checkbox" ${sf.visible ? 'checked' : ''} onchange="window.setFieldProp('visible', this.checked)">
              <span class="switch-slider"></span>
            </label>
            <span style="font-size:13px">显示此字段</span>
          </div>
          <div class="form-group">
            <label class="form-label">X 坐标: ${sf.x} rpx</label>
            <input type="range" min="0" max="${canvasW - 20}" value="${sf.x}" style="width:100%"
              oninput="window.setFieldProp('x', parseInt(this.value))">
          </div>
          <div class="form-group">
            <label class="form-label">Y 坐标: ${sf.y} rpx</label>
            <input type="range" min="0" max="${canvasH - 16}" value="${sf.y}" style="width:100%"
              oninput="window.setFieldProp('y', parseInt(this.value))">
          </div>
        </div>
      `
    }

    const html = `
      <div class="page-header">
        <button class="btn btn-outline" onclick="window.cancelEdit()">← 返回列表</button>
        <h1>${tpl.id ? '编辑模板' : '新建模板'}</h1>
        <button class="btn btn-outline btn-sm" onclick="window.undo()" title="撤销 Ctrl+Z">↩</button>
        <button class="btn btn-outline btn-sm" onclick="window.redo()" title="重做 Ctrl+Y">↪</button>
        <button class="btn btn-primary" onclick="window.saveTemplate()">💾 保存模板</button>
      </div>

      <div style="display:flex;gap:24px;flex-wrap:wrap">
        <!-- Canvas -->
        <div class="card" style="flex:1;min-width:340px;display:flex;flex-direction:column;align-items:center">
          <div style="margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
            <label class="form-label" style="margin:0">模板名称：</label>
            <input type="text" class="form-input" style="width:180px" value="${escHtml(tpl.name)}"
              oninput="editingTpl.name = this.value" placeholder="输入模板名称">
            <label class="form-label" style="margin:0">背景色：</label>
            <input type="color" value="${bg}" style="width:32px;height:32px;border:none;cursor:pointer"
              onchange="editingTpl.background = this.value; window.autoAdjustTextColors()">
            <button class="btn btn-sm btn-outline" onclick="window.autoAdjustTextColors()" title="自动适配文字颜色">🎨 自动适配</button>
            <span style="font-size:12px;font-weight:700;color:var(--on-surface-variant);margin-left:8px">导出:</span>
            <button class="btn btn-sm btn-outline" onclick="window.exportPNG()">PNG</button>
            <button class="btn btn-sm btn-outline" onclick="window.exportJPG()">JPG</button>
            <button class="btn btn-sm btn-outline" onclick="window.exportPDF()">PDF</button>
          </div>
          <div style="margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span style="font-size:12px;font-weight:700;color:var(--on-surface-variant)">方向:</span>
            <button class="tpl-tool-btn ${orientation==='landscape'?'tpl-tool-btn-active':''}" onclick="window.switchOrientation('landscape')">▭ 横版</button>
            <button class="tpl-tool-btn ${orientation==='portrait'?'tpl-tool-btn-active':''}" onclick="window.switchOrientation('portrait')">▯ 竖版</button>
            <span style="font-size:12px;font-weight:700;color:var(--on-surface-variant);margin-left:8px">尺寸:</span>
            <select style="padding:5px 8px;border-radius:6px;border:1px solid #dce3ef;font-size:12px"
              onchange="window.setPreset(this.value)">
              ${Object.entries(PRESETS).map(([k,v]) => `<option value="${k}" ${preset===k?'selected':''}>${v.label} (${v.w}×${v.h})</option>`).join('')}
            </select>
            <span style="font-size:11px;color:#a0aec0">${canvasW}×${canvasH} rpx</span>
            <span style="font-size:12px;font-weight:700;color:var(--on-surface-variant);margin-left:8px">网格:</span>
            <select style="padding:5px 8px;border-radius:6px;border:1px solid #dce3ef;font-size:12px"
              onchange="window.setGridPreset(this.value)">
              ${(() => { const cur = gridCols+'x'+gridRows; const presets = ['3x4','6x6','10x6','12x12']; return presets.map(g => '<option value="'+g+'"'+(cur===g?' selected':'')+'>'+g.replace('x','×')+'</option>').join('') + '<option value="custom"'+(presets.includes(cur)?'':' selected')+'>自定义</option>'; })()}
            </select>
            <button class="tpl-tool-btn ${showGrid?'tpl-tool-btn-active':''}" onclick="window.toggleGrid()" title="显示/隐藏网格">⊞</button>
          </div>
          <div class="tpl-canvas" style="background-color:${bg};width:${canvasW}px;height:${canvasH}px"
            onpointerdown="window.canvasMouseDown(event)">

            ${(() => { const t = THEMES[editingTpl.theme || 'cyberpunk']; return (t && t.decorations && t.decorations.includes('diamond')) ? '' : '<style>.tpl-canvas::before,.tpl-canvas::after{display:none}</style>'; })()}
            ${snapGuideLines.map(g => {

  function escHtml(s) {
    if (!s) return ''
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  // ---- Actions ----
  window.addTemplate = function() {
    editingTpl = {
      id: 0,
      name: '赛博科技名片',
      background: '#000000',
      logoUrl: '',
      colors: { primary: '#ff4d4d', secondary: '#ff6666' },
      fields: JSON.parse(JSON.stringify(DEFAULT_FIELDS)),
      canvasW: 360, canvasH: 216, orientation: 'landscape', preset: 'business-card',
      theme: 'cyberpunk'
    }
    canvasW = 360; canvasH = 216; orientation = 'landscape'; preset = 'business-card'
    gridCols = 3; gridRows = 4
    selectedFieldIndices = []
    historyStack = []; historyIndex = -1
    render()
  }

  window.editTemplate = function(id) {
    const tpl = templates.find(t => t.id === id)
    if (!tpl) return
    editingTpl = JSON.parse(JSON.stringify(tpl))
    // Restore canvas state from template
    if (editingTpl.canvasW) canvasW = editingTpl.canvasW
    else canvasW = 360
    if (editingTpl.canvasH) canvasH = editingTpl.canvasH
    else canvasH = 216
    orientation = editingTpl.orientation || 'landscape'
    preset = editingTpl.preset || 'business-card'
    if (!editingTpl.fields || editingTpl.fields.length === 0) {
      editingTpl.fields = JSON.parse(JSON.stringify(DEFAULT_FIELDS))
    }
    // Auto-migrate old portrait-layout coordinates to landscape canvas
    if (editingTpl.fields.some(f => f.y > canvasH)) {
      editingTpl.fields = JSON.parse(JSON.stringify(DEFAULT_FIELDS))
    }
    selectedFieldIndices = []
    historyStack = []; historyIndex = -1
    render()
  }

  window.duplicateTemplate = async function(id) {
    const tpl = templates.find(t => t.id === id)
    if (!tpl) return
    const copy = JSON.parse(JSON.stringify(tpl))
    copy.id = 0
    copy.name = (copy.name || '模板') + ' 副本'
    await DataStore.saveCardTemplate(copy)
    Admin.showToast('模板已复制', 'success')
    render()
  }

  window.deleteTemplate = function(id) {
    Admin.confirmDelete('确定删除此模板？', async () => {
      await DataStore.deleteCardTemplate(id)
      Admin.showToast('已删除', 'success')
      render()
    })
  }

  // ---- Custom text field ----
  window.addTextField = function(cx, cy) {
    if (!editingTpl || !editingTpl.fields) return
    pushHistory()
    const x = cx != null ? cx : Math.round(canvasW / 2)
    const y = cy != null ? cy : Math.round(canvasH / 2)
    const id = 'custom_' + Date.now()
    editingTpl.fields.push({
      key: id, label: '自定义文本', x: x, y: y,
      fontSize: 14, color: '#333333', fontFamily: '微软雅黑',
      textAlign: 'center', width: 120, visible: true, isCustom: true,
      fontWeight: 'normal', lineHeight: 1.2, letterSpacing: 0, opacity: 1, rotation: 0
    })
    selectedFieldIndices = [editingTpl.fields.length - 1]
    renderEditor()
  }

  window.deleteField = function(idx) {
    if (!editingTpl || !editingTpl.fields) return
    const f = editingTpl.fields[idx]
    if (!f || !f.isCustom) {
      Admin.showToast('预设字段不可删除', 'error')
      return
    }
    pushHistory()
    editingTpl.fields.splice(idx, 1)
    selectedFieldIndices = []
    renderEditor()
    Admin.showToast('已删除自定义字段', 'success')
  }

  // ---- Canvas orientation + preset ----
  window.switchOrientation = function(dir) {
    if (orientation === dir) return
    const p = PRESETS[preset]
    const w = dir === 'landscape' ? Math.max(p.w, p.h) : Math.min(p.w, p.h)
    const h = dir === 'landscape' ? Math.min(p.w, p.h) : Math.max(p.w, p.h)
    applyCanvasSize(w, h, dir, preset)
    renderEditor()
  }

  // ---- Smart text color ----
  function getBrightness(hex) {
    if (!hex || hex.length < 7) return 128
    const r = parseInt(hex.slice(1, 3), 16)
    const g = parseInt(hex.slice(3, 5), 16)
    const b = parseInt(hex.slice(5, 7), 16)
    return (r * 299 + g * 587 + b * 114) / 1000
  }

  window.autoAdjustTextColors = function() {
    if (!editingTpl || !editingTpl.fields) return
    const bgBright = getBrightness(editingTpl.background || '#0A0B10')
    const fields = editingTpl.fields
    fields.forEach(f => {
      if (!f.visible) return
      const fBright = getBrightness(f.color || '#ffffff')
      // If contrast is insufficient (diff < 60), flip color
      if (Math.abs(bgBright - fBright) < 60) {
        f.color = bgBright < 128 ? '#ffffff' : '#1a1a1a'
      }
    })
    renderEditor()
    Admin.showToast('文字颜色已自动适配背景', 'info')
  }

  // ---- Grid ----
  window.toggleGrid = function() {
    showGrid = !showGrid
    renderEditor()
  }

  window.setGridPreset = function(val) {
    if (val === 'custom') {
      const cols = parseInt(prompt('列数:', gridCols)) || gridCols
      const rows = parseInt(prompt('行数:', gridRows)) || gridRows
      gridCols = Math.max(1, Math.min(24, cols))
      gridRows = Math.max(1, Math.min(24, rows))
    } else {
      const [c, r] = val.split('x').map(Number)
      gridCols = c; gridRows = r
    }
    renderEditor()
  }

  window.setPreset = function(key) {
    const p = PRESETS[key]
    if (!p) return
    let w = p.w, h = p.h
    if (orientation === 'portrait') { w = p.h; h = p.w }
    applyCanvasSize(w, h, orientation, key)
    renderEditor()
  }

      return

  // ---- Field selection (Ctrl/Cmd+click for multi-select) ----
  window.selectField = function(idx, e) {
    if (e && (e.ctrlKey || e.metaKey)) {
      const pos = selectedFieldIndices.indexOf(idx)
      if (pos >= 0) selectedFieldIndices.splice(pos, 1)
      else selectedFieldIndices.push(idx)
    } else {
      selectedFieldIndices = [idx]
    }
    renderEditor()
  }

  // ---- Canvas pointerdown (deselect) ----
  let lastCanvasClickTime = 0
  window.canvasMouseDown = function(e) {
    if (e.target.classList.contains('tpl-field')) return
    // Double-click on empty canvas --> add text field at position
    const now = Date.now()
    if (now - lastCanvasClickTime < 350) {
      const canvas = document.querySelector('.tpl-canvas')
      const cr = canvas.getBoundingClientRect()
      const rx = (e.clientX - cr.left) / cr.width
      const ry = (e.clientY - cr.top) / cr.height
      window.addTextField(Math.round(rx * canvasW - 60), Math.round(ry * canvasH - 7))
      lastCanvasClickTime = 0
      return
    }
    lastCanvasClickTime = now
    selectedFieldIndices = []
    renderEditor()
  }

  // ---- Field drag (pointer events + rAF + smart snapping) ----
  window.fieldMouseDown = function(e, idx) {
    e.preventDefault()
    // If not already in selection, select single; if in multi-selection, keep it
    if (!selectedFieldIndices.includes(idx)) {
      selectedFieldIndices = [idx]
    }
    dragFieldIdx = idx
    dragStartX = e.clientX
    dragStartY = e.clientY
    if (guideTimeoutId) { clearTimeout(guideTimeoutId); guideTimeoutId = null }
    const f = editingTpl.fields[idx]
    fieldStartX = f.x
    fieldStartY = f.y
    document.addEventListener('pointermove', onFieldDrag)
    document.addEventListener('pointerup', onFieldUp)
    renderEditor()
  }

  function getFieldDomSize(idx) {
    const el = document.querySelector('.tpl-field[data-idx="' + idx + '"]')
    if (el) {
      const r = el.getBoundingClientRect()
      const canvas = document.querySelector('.tpl-canvas')
      const cr = canvas ? canvas.getBoundingClientRect() : null
      if (cr) {
        return { w: (r.width / cr.width) * canvasW, h: (r.height / cr.height) * canvasH }
      }
    }
    const f = editingTpl.fields[idx]
    return { w: f.label.length * f.fontSize * 0.6, h: f.fontSize }
  }

  function onFieldDrag(e) {
    if (dragFieldIdx < 0) return
    if (rafId) return
    rafId = requestAnimationFrame(() => {
      rafId = null
      const dx = (e.clientX - dragStartX) / SCALE
      const dy = (e.clientY - dragStartY) / SCALE
      const cellW = canvasW / gridCols
      const cellH = canvasH / gridRows
      let nx = Math.round((fieldStartX + dx) / cellW) * cellW
      let ny = Math.round((fieldStartY + dy) / cellH) * cellH

      const f = editingTpl.fields[dragFieldIdx]
      const domSize = getFieldDomSize(dragFieldIdx)
      const fw = domSize.w
      const fh = domSize.h
      const fcx = nx + fw / 2
      const fcy = ny + fh / 2

      // Object-to-object smart snapping (8px threshold)
      snapGuideLines = []
      const allFields = editingTpl.fields
      for (let i = 0; i < allFields.length; i++) {
        if (i === dragFieldIdx || !allFields[i].visible) continue
        const o = allFields[i]
        const os = getFieldDomSize(i)
        const ow = os.w, oh = os.h
        const oright = o.x + ow, obottom = o.y + oh
        const ocy = o.y + oh / 2, ocx = o.x + ow / 2

        // X-axis snaps: left-to-left, center-to-center, right-to-right, left-to-right, right-to-left
        const xCandidates = [
          { myEdge: nx,        otherEdge: o.x,   type: 'left' },
          { myEdge: fcx,       otherEdge: ocx,   type: 'centerH' },
          { myEdge: nx + fw,   otherEdge: oright, type: 'right' },
          { myEdge: nx + fw,   otherEdge: o.x,   type: 'left' },   // my right to other left
          { myEdge: nx,        otherEdge: oright, type: 'right' }   // my left to other right
        ]
        // Y-axis snaps
        const yCandidates = [
          { myEdge: ny,        otherEdge: o.y,   type: 'top' },
          { myEdge: fcy,       otherEdge: ocy,   type: 'middle' },
          { myEdge: ny + fh,   otherEdge: obottom, type: 'bottom' },
          { myEdge: ny + fh,   otherEdge: o.y,   type: 'top' },    // my bottom to other top
          { myEdge: ny,        otherEdge: obottom, type: 'bottom' }  // my top to other bottom
        ]

        const SNAP = 8
        // Find best X snap (closest within threshold, edge priority over center)
        let bestX = null, bestXDist = SNAP + 1
        for (const c of xCandidates) {
          const dist = Math.abs(c.myEdge - c.otherEdge)
          const isEdge = c.type === 'left' || c.type === 'right'
          // edge snaps get priority: count as 0.7× distance vs center
          const weighted = isEdge ? dist * 0.7 : dist
          if (dist < SNAP && weighted < bestXDist) {
            bestX = { dist, target: c.otherEdge, offset: c.myEdge - nx }
            bestXDist = weighted
          }
        }
        // Find best Y snap
        let bestY = null, bestYDist = SNAP + 1
        for (const c of yCandidates) {
          const dist = Math.abs(c.myEdge - c.otherEdge)
          const isEdge = c.type === 'top' || c.type === 'bottom'
          const weighted = isEdge ? dist * 0.7 : dist
          if (dist < SNAP && weighted < bestYDist) {
            bestY = { dist, target: c.otherEdge, offset: c.myEdge - ny }
            bestYDist = weighted
          }
        }

        if (bestX && bestY) {
          // Both snap: apply X first if dist is smaller, else Y first
          if (bestXDist <= bestYDist) {
            nx = bestX.target - bestX.offset
            ny = bestY.target - bestY.offset
          } else {
            ny = bestY.target - bestY.offset
            nx = bestX.target - bestX.offset
          }
          snapGuideLines.push({ axis: 'x', pos: bestX.target })
          snapGuideLines.push({ axis: 'y', pos: bestY.target })
          break
        } else if (bestX) {
          nx = bestX.target - bestX.offset
          snapGuideLines.push({ axis: 'x', pos: bestX.target })
        } else if (bestY) {
          ny = bestY.target - bestY.offset
          snapGuideLines.push({ axis: 'y', pos: bestY.target })
        }
      }

      // Boundary clamp
      nx = Math.max(0, Math.min(canvasW - fw, nx))
      ny = Math.max(0, Math.min(canvasH - fh, ny))
      f.x = Math.round(nx)
      f.y = Math.round(ny)
      renderEditor()
    })
  }

  function onFieldUp() {
    if (dragFieldIdx >= 0) pushHistory()
    dragFieldIdx = -1
    document.removeEventListener('pointermove', onFieldDrag)
    document.removeEventListener('pointerup', onFieldUp)
    // Fade out guide lines after release
    guideTimeoutId = setTimeout(() => { snapGuideLines = []; renderEditor(); guideTimeoutId = null }, 200)
  }

  // ---- Field property set ----
  window.setFieldProp = function(prop, value) {
    if (selectedFieldIndices.length !== 1 || !editingTpl || !editingTpl.fields) return
    pushHistory()
    editingTpl.fields[selectedFieldIndices[0]][prop] = value
    renderEditor()
  }

  // ---- Alignment ----
  window.alignFields = function(direction) {
    if (selectedFieldIndices.length < 2 || !editingTpl || !editingTpl.fields) return
    pushHistory()
    const fields = editingTpl.fields
    const sel = selectedFieldIndices.map(i => fields[i])
    switch (direction) {
      case 'left':
        const minX = Math.min(...sel.map(f => f.x))
        selectedFieldIndices.forEach(i => { fields[i].x = minX })
        break
      case 'centerH': {
        const avgX = Math.round(sel.reduce((s, f) => s + f.x + (f.width || f.label.length * f.fontSize * 0.6) / 2, 0) / sel.length)
        selectedFieldIndices.forEach(i => {
          const w = fields[i].width || fields[i].label.length * fields[i].fontSize * 0.6
          fields[i].x = Math.round(avgX - w / 2)
        })
        break
      }
      case 'right': {
        const maxR = Math.max(...sel.map(f => f.x + (f.width || f.label.length * f.fontSize * 0.6)))
        selectedFieldIndices.forEach(i => {
          const w = fields[i].width || fields[i].label.length * fields[i].fontSize * 0.6
          fields[i].x = Math.round(maxR - w)
        })
        break
      }
      case 'top':
        const minY = Math.min(...sel.map(f => f.y))
        selectedFieldIndices.forEach(i => { fields[i].y = minY })
        break
      case 'middle': {
        const avgY = Math.round(sel.reduce((s, f) => s + f.y + f.fontSize / 2, 0) / sel.length)
        selectedFieldIndices.forEach(i => { fields[i].y = Math.round(avgY - fields[i].fontSize / 2) })
        break
      }
      case 'bottom': {
        const maxB = Math.max(...sel.map(f => f.y + f.fontSize))
        selectedFieldIndices.forEach(i => { fields[i].y = Math.round(maxB - fields[i].fontSize) })
        break
      }
      case 'distributeH': {
        if (sel.length < 3) break
        const sorted = [...selectedFieldIndices].sort((a, b) => fields[a].x - fields[b].x)
        const first = fields[sorted[0]], last = fields[sorted[sorted.length - 1]]
        const firstW = first.width || first.label.length * first.fontSize * 0.6
        const totalSpace = (last.x) - (first.x + firstW)
        const gap = totalSpace / (sorted.length - 1)
        for (let i = 1; i < sorted.length - 1; i++) {
          fields[sorted[i]].x = Math.round(first.x + firstW + gap * i)
        }
        break
      }
    }
    renderEditor()
  }

  // ---- Global search ----
  window.onGlobalSearch = function() {}

  // ---- Export ----
  async function exportCanvasImage(format) {
    const canvas = document.querySelector('.tpl-canvas')
    if (!canvas) return
    // Hide UI elements temporarily
    const gridOverlay = canvas.querySelector('.tpl-grid-overlay')
    const guideLines = canvas.querySelectorAll('.tpl-guide-line')
    if (gridOverlay) gridOverlay.style.display = 'none'
    guideLines.forEach(g => g.style.display = 'none')
    // Remove selection outlines
    const selected = canvas.querySelectorAll('.tpl-field-selected')
    selected.forEach(s => { s.style.outline = 'none'; s.style.border = '1px solid transparent' })

    try {
      const result = await html2canvas(canvas, {
        backgroundColor: editingTpl ? editingTpl.background : '#050508',
        scale: 2
      })
      const mime = format === 'jpg' ? 'image/jpeg' : 'image/png'
      const ext = format === 'jpg' ? 'jpg' : 'png'
      result.toBlob(blob => {
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = (editingTpl ? editingTpl.name : 'card') + '.' + ext
        a.click()
        URL.revokeObjectURL(url)
      }, mime, 0.95)
    } catch (err) {
      Admin.showToast('导出失败: ' + err.message, 'error')
    }

    // Restore UI elements
    if (gridOverlay) gridOverlay.style.display = ''
    guideLines.forEach(g => g.style.display = '')
    selected.forEach(s => { s.style.outline = ''; s.style.border = '' })
  }

  window.exportPNG = function() { exportCanvasImage('png') }
  window.exportJPG = function() { exportCanvasImage('jpg') }

  window.exportPDF = async function() {
    const canvas = document.querySelector('.tpl-canvas')
    if (!canvas) return
    const gridOverlay = canvas.querySelector('.tpl-grid-overlay')
    const guideLines = canvas.querySelectorAll('.tpl-guide-line')
    const selected = canvas.querySelectorAll('.tpl-field-selected')
    if (gridOverlay) gridOverlay.style.display = 'none'
    guideLines.forEach(g => g.style.display = 'none')
    selected.forEach(s => { s.style.outline = 'none'; s.style.border = '1px solid transparent' })

    try {
      const result = await html2canvas(canvas, { backgroundColor: editingTpl ? editingTpl.background : '#050508', scale: 2 })
      const imgData = result.toDataURL('image/png')
      // Open in new tab for print-to-PDF (avoids jsPDF dependency)
      const w = window.open('', '_blank')
      w.document.write(`<img src="${imgData}" style="max-width:100%" onload="window.print()">`)
    } catch (err) {
      Admin.showToast('导出失败: ' + err.message, 'error')
    }

    if (gridOverlay) gridOverlay.style.display = ''
    guideLines.forEach(g => g.style.display = '')
    selected.forEach(s => { s.style.outline = ''; s.style.border = '' })
  }

  // ---- Keyboard shortcuts ----
  document.addEventListener('keydown', function(e) {
    if (!editingTpl) return
    // Undo: Ctrl+Z (not Ctrl+Shift+Z)
    if (e.ctrlKey && !e.shiftKey && e.key === 'z') {
      e.preventDefault()
      window.undo()
      return
    }
    // Redo: Ctrl+Y or Ctrl+Shift+Z
    if ((e.ctrlKey && e.key === 'y') || (e.ctrlKey && e.shiftKey && e.key === 'z')) {
      e.preventDefault()
      window.redo()
      return
    }
    // Arrow key nudge (1px without snap, 10px with Shift)
    if (selectedFieldIndices.length > 0 && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
      e.preventDefault()
      pushHistory()
      const step = e.shiftKey ? 10 : 1
      selectedFieldIndices.forEach(i => {
        const f = editingTpl.fields[i]
        if (!f) return
        switch (e.key) {
          case 'ArrowLeft':  f.x = Math.max(0, f.x - step); break
          case 'ArrowRight': f.x = Math.min(canvasW - 20, f.x + step); break
          case 'ArrowUp':    f.y = Math.max(0, f.y - step); break
          case 'ArrowDown':  f.y = Math.min(canvasH - 16, f.y + step); break
        }
      })
      renderEditor()
    }
  })

  render()
})()
</script>
