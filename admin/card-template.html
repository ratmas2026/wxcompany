<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>名片模板 - Admin Panel</title>
<link rel="stylesheet" href="css/common.css"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="js/data.js"></script>
<script src="js/common.js"></script>
</head>
<body>
<div id="app"></div>

<script>
(async function() {
  Admin.init('card-template')
  await DataStore.init()

  // State
  let templates = []
  let editingTpl = null          // currently editing template object
  let selectedFieldIndices = []  // multi-select: array of indices into editingTpl.fields
  let dragFieldIdx = -1
  let dragStartX = 0, dragStartY = 0
  let fieldStartX = 0, fieldStartY = 0
  let snapGuideLines = []        // {axis:'x'|'y', pos:Number} for alignment guide rendering
  let rafId = null               // requestAnimationFrame id for drag throttling
  let guideTimeoutId = null      // setTimeout id for guide line fade-out

  const CANVAS_W = 360  // preview canvas width (px), maps to 360rpx (1:1)
  const CANVAS_H = 216  // preview canvas height (px), standard card ratio ~1.67, landscape
  const SCALE = 1.0     // rpx to px scale (1:1)

  // Default Qwen Neon Synth Labs layout
  const DEFAULT_FIELDS = [
    { key: 'company',  label: '公司名称', x: 20, y: 30,  fontSize: 22, color: '#ff4b4b', fontFamily: 'Share Tech Mono', textAlign: 'center', width: 320, visible: true },
    { key: 'name',     label: '姓名',     x: 40, y: 88,  fontSize: 18, color: '#ff4b4b', fontFamily: 'Share Tech Mono', textAlign: 'center', width: 280, visible: true },
    { key: 'title',    label: '职务',     x: 40, y: 114, fontSize: 12, color: '#ff6b6b', fontFamily: 'Share Tech Mono', textAlign: 'center', width: 280, visible: true },
    { key: 'address',  label: '地址',     x: 20, y: 170, fontSize: 11, color: '#ff6b6b', fontFamily: 'Share Tech Mono', textAlign: 'left',   width: 160, visible: true },
    { key: 'phone',    label: '手机',     x: 195,y: 170, fontSize: 11, color: '#ff6b6b', fontFamily: 'Share Tech Mono', textAlign: 'right',  width: 145, visible: true },
    { key: 'email',    label: '邮箱',     x: 195,y: 190, fontSize: 11, color: '#ff6b6b', fontFamily: 'Share Tech Mono', textAlign: 'right',  width: 145, visible: true }
  ]

  const COLORS = ['#ff4b4b', '#ff6b6b', '#ff8888', '#ffaaaa', '#ffffff', '#ffd700', '#00ffff', '#ff00ff']

  function loadTemplates() {
    templates = DataStore.getCardTemplates()
  }

  // ---- Render ----
  function render() {
    loadTemplates()
    if (editingTpl) {
      renderEditor()
      return
    }
    renderList()
  }

  function renderList() {
    const cardsHtml = templates.length === 0
      ? '<div class="empty-state"><div class="empty-icon">🎨</div><p>暂无模板</p><p style="font-size:12px">点击右上角"添加模板"创建</p></div>'
      : templates.map(tpl => {
          const bg = tpl.background || '#0A0B0D'
          const previewHtml = renderPreviewCanvas(tpl, 360, 216)
          return `
            <div class="media-card">
              <div class="media-thumb" style="background:${bg};position:relative;overflow:hidden;">
                <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
                  <div style="position:relative;width:280px;height:168px;transform:scale(0.78);transform-origin:center center">
                    ${previewHtml}
                  </div>
                </div>
              </div>
              <div class="media-body">
                <div class="media-title">${escHtml(tpl.name)}</div>
                <div class="media-meta">
                  <span>📋 ${(tpl.fields || []).length} 个字段</span>
                  <span>📅 ${tpl.createdAt || ''}</span>
                </div>
                <div class="media-actions">
                  <button class="btn btn-outline btn-sm" onclick="window.editTemplate(${tpl.id})">✏️ 编辑</button>
                  <button class="btn btn-outline btn-sm" onclick="window.duplicateTemplate(${tpl.id})">📋 复制</button>
                  <button class="btn btn-sm" style="color:#e53e3e;border:1px solid #e53e3e;background:transparent" onclick="window.deleteTemplate(${tpl.id})">🗑 删除</button>
                </div>
              </div>
            </div>`
        }).join('')

    const html = `
      <div class="page-header">
        <h1>名片模板</h1>
        <button class="btn btn-primary" onclick="window.addTemplate()">+ 添加模板</button>
      </div>
      <div class="card-grid">
        ${cardsHtml}
      </div>
    `
    Admin.setPageContent(html)
  }

  function renderPreviewCanvas(tpl, w, h) {
    if (!tpl || !tpl.fields) return ''
    const scaleX = w / CANVAS_W
    const scaleY = h / CANVAS_H
    const lines = (tpl.fields || []).filter(f => f.visible !== false).map(f => {
      const left = f.x * SCALE * scaleX
      const top = f.y * SCALE * scaleY
      const fs = Math.round(f.fontSize * scaleX)
      const ff = f.fontFamily || 'Share Tech Mono'
      const ta = f.textAlign || 'left'
      const fw = f.width ? f.width * scaleX : null
      return `<div style="position:absolute;left:${left}px;top:${top}px;font-size:${fs}px;color:${escHtml(f.color || '#717777')};font-family:${escHtml(ff)},monospace;white-space:nowrap;line-height:1.2;text-shadow:0 0 5px rgba(255,75,75,0.6);text-align:${escHtml(ta)};${fw ? 'width:'+Math.round(fw)+'px' : ''}">${escHtml(f.label)}</div>`
    }).join('')
    return lines
  }

  // ---- Editor ----
  function renderEditor() {
    const tpl = editingTpl
    const bg = tpl.background || '#030909'
    const fields = tpl.fields || []

    // Build field elements for canvas
    const fieldEls = fields.map((f, idx) => {
      if (!f.visible) return ''
      const left = f.x * SCALE
      const top = f.y * SCALE
      const selected = selectedFieldIndices.includes(idx)
      const ta = f.textAlign || 'left'
      const fw = f.width || null
      return `<div class="tpl-field ${selected ? 'tpl-field-selected' : ''}"
        style="left:${left}px;top:${top}px;font-size:${f.fontSize * SCALE}px;color:${escHtml(f.color)};font-family:${escHtml(f.fontFamily || 'Share Tech Mono')},monospace;text-align:${escHtml(ta)};${fw ? 'width:'+fw+'px' : ''}"
        data-idx="${idx}"
        onpointerdown="window.fieldMouseDown(event, ${idx})">${escHtml(f.label)}</div>`
    }).join('')

    // Property panel for selected field (single selection only)
    let propPanel = ''
    if (selectedFieldIndices.length === 1) {
      const sf = fields[selectedFieldIndices[0]]
      const colorBtns = COLORS.map(c =>
        `<button class="color-swatch ${sf.color === c ? 'color-swatch-active' : ''}"
          style="background:${c}" title="${c}"
          onclick="window.setFieldProp('color','${c}')"></button>`
      ).join('')
      propPanel = `
        <div class="card" style="margin-top:16px">
          <h3 style="margin:0 0 16px;font-size:15px">✏️ 属性：${escHtml(sf.label)}</h3>
          <div class="form-group">
            <label class="form-label">字号</label>
            <input type="range" min="16" max="48" value="${sf.fontSize}" style="width:100%"
              oninput="window.setFieldProp('fontSize', parseInt(this.value))">
            <span style="font-size:12px;color:#718096">${sf.fontSize} rpx</span>
          </div>
          <div class="form-group">
            <label class="form-label">颜色</label>
            <div style="display:flex;gap:6px;flex-wrap:wrap">${colorBtns}</div>
          </div>
          <div class="form-group">
            <label class="form-label">对齐</label>
            <select style="width:100%;padding:6px 8px;border-radius:6px;border:1px solid #dce3ef"
              onchange="window.setFieldProp('textAlign', this.value)">
              <option value="left" ${(sf.textAlign||'left')==='left'?'selected':''}>左对齐</option>
              <option value="center" ${sf.textAlign==='center'?'selected':''}>居中</option>
              <option value="right" ${sf.textAlign==='right'?'selected':''}>右对齐</option>
            </select>
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:12px">
            <label class="switch">
              <input type="checkbox" ${sf.visible ? 'checked' : ''} onchange="window.setFieldProp('visible', this.checked)">
              <span class="switch-slider"></span>
            </label>
            <span style="font-size:13px">显示此字段</span>
          </div>
          <div class="form-group">
            <label class="form-label">X 坐标: ${sf.x} rpx</label>
            <input type="range" min="0" max="340" value="${sf.x}" style="width:100%"
              oninput="window.setFieldProp('x', parseInt(this.value))">
          </div>
          <div class="form-group">
            <label class="form-label">Y 坐标: ${sf.y} rpx</label>
            <input type="range" min="0" max="200" value="${sf.y}" style="width:100%"
              oninput="window.setFieldProp('y', parseInt(this.value))">
          </div>
        </div>
      `
    }

    const html = `
      <div class="page-header">
        <button class="btn btn-outline" onclick="window.cancelEdit()">← 返回列表</button>
        <h1>${tpl.id ? '编辑模板' : '新建模板'}</h1>
        <button class="btn btn-primary" onclick="window.saveTemplate()">💾 保存模板</button>
      </div>

      <div style="display:flex;gap:24px;flex-wrap:wrap">
        <!-- Canvas -->
        <div class="card" style="flex:1;min-width:340px;display:flex;flex-direction:column;align-items:center">
          <div style="margin-bottom:16px;display:flex;align-items:center;gap:12px">
            <label class="form-label" style="margin:0">模板名称：</label>
            <input type="text" class="form-input" style="width:220px" value="${escHtml(tpl.name)}"
              oninput="editingTpl.name = this.value" placeholder="输入模板名称">
            <label class="form-label" style="margin:0 0 0 16px">背景色：</label>
            <input type="color" value="${bg}" style="width:36px;height:36px;border:none;cursor:pointer"
              oninput="editingTpl.background = this.value; renderEditor()">
          </div>
          <div class="tpl-canvas" style="background-color:${bg};width:${CANVAS_W}px;height:${CANVAS_H}px"
            onpointerdown="window.canvasMouseDown(event)">
            <div class="tpl-scanline"></div>
            <div class="tpl-deco-circle"></div>
            <div class="tpl-hex-pattern">⬡ ⬡<br>⬡ ⬡<br>⬡</div>
            ${snapGuideLines.map(g => {
              const fading = dragFieldIdx < 0 ? ' tpl-guide-fading' : ''
              if (g.axis === 'x') return `<div class="tpl-guide-line tpl-guide-v${fading}" style="left:${g.pos}px"></div>`
              return `<div class="tpl-guide-line tpl-guide-h${fading}" style="top:${g.pos}px"></div>`
            }).join('')}
            ${fieldEls}
          </div>
          <div style="margin-top:8px;font-size:11px;color:#a0aec0">底板 360×216 rpx · 横版名片 · 点击选中 · Ctrl+点击多选 · 拖拽吸附</div>
        </div>

        <!-- Side Panel -->
        <div style="width:280px;flex-shrink:0">
          <div class="card">
            <h3 style="margin:0 0 12px;font-size:15px">📋 字段列表</h3>
            <div style="font-size:12px;color:#718096;margin-bottom:8px">点击底板字段或下方列表选中</div>
            ${fields.map((f, idx) => `
              <div class="field-list-item ${selectedFieldIndices.includes(idx) ? 'field-list-item-active' : ''}"
                style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;margin-bottom:4px;border-radius:6px;cursor:pointer;font-size:13px;${selectedFieldIndices.includes(idx) ? 'background:#ebf4ff;color:#3a5f94;font-weight:600' : 'background:#f7fafc'}"
                onclick="window.selectField(${idx}, event)">
                <span>${f.visible ? '👁' : '🚫'} ${escHtml(f.label)}</span>
                <span style="font-size:11px;color:#a0aec0">${f.x},${f.y}</span>
              </div>
            `).join('')}
          </div>
          ${selectedFieldIndices.length >= 2 ? `
          <div class="card" style="margin-top:16px">
            <h3 style="margin:0 0 8px;font-size:13px">🔧 对齐工具（${selectedFieldIndices.length} 个选中）</h3>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
              <button class="tpl-align-btn" onclick="window.alignFields('left')" title="左对齐">⬅</button>
              <button class="tpl-align-btn" onclick="window.alignFields('centerH')" title="水平居中">↕</button>
              <button class="tpl-align-btn" onclick="window.alignFields('right')" title="右对齐">➡</button>
              <button class="tpl-align-btn" onclick="window.alignFields('top')" title="顶对齐">⬆</button>
              <button class="tpl-align-btn" onclick="window.alignFields('middle')" title="垂直居中">↔</button>
              <button class="tpl-align-btn" onclick="window.alignFields('bottom')" title="底对齐">⬇</button>
              <button class="tpl-align-btn" onclick="window.alignFields('distributeH')" title="水平分布" style="width:auto;padding:4px 8px;font-size:11px">↔分布</button>
            </div>
          </div>
          ` : ''}
          ${propPanel}
        </div>
      </div>
    `
    Admin.setPageContent(html)
  }

  // ---- Helpers ----
  function escHtml(s) {
    if (!s) return ''
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  // ---- Actions ----
  window.addTemplate = function() {
    editingTpl = {
      id: 0,
      name: 'Neon Synth Labs',
      background: '#050508',
      logoUrl: '',
      colors: { primary: '#ff4b4b', secondary: '#ff6b6b' },
      fields: JSON.parse(JSON.stringify(DEFAULT_FIELDS))
    }
    selectedFieldIndices = []
    render()
  }

  window.editTemplate = function(id) {
    const tpl = templates.find(t => t.id === id)
    if (!tpl) return
    editingTpl = JSON.parse(JSON.stringify(tpl))
    if (!editingTpl.fields || editingTpl.fields.length === 0) {
      editingTpl.fields = JSON.parse(JSON.stringify(DEFAULT_FIELDS))
    }
    // Auto-migrate old portrait-layout coordinates to landscape canvas
    if (editingTpl.fields.some(f => f.y > CANVAS_H)) {
      editingTpl.fields = JSON.parse(JSON.stringify(DEFAULT_FIELDS))
    }
    selectedFieldIndices = []
    render()
  }

  window.duplicateTemplate = async function(id) {
    const tpl = templates.find(t => t.id === id)
    if (!tpl) return
    const copy = JSON.parse(JSON.stringify(tpl))
    copy.id = 0
    copy.name = (copy.name || '模板') + ' 副本'
    await DataStore.saveCardTemplate(copy)
    Admin.showToast('模板已复制', 'success')
    render()
  }

  window.deleteTemplate = function(id) {
    Admin.confirmDelete('确定删除此模板？', async () => {
      await DataStore.deleteCardTemplate(id)
      Admin.showToast('已删除', 'success')
      render()
    })
  }

  window.cancelEdit = function() {
    editingTpl = null
    selectedFieldIndices = []
    render()
  }

  window.saveTemplate = async function() {
    if (!editingTpl.name.trim()) {
      Admin.showToast('请输入模板名称', 'error')
      return
    }
    await DataStore.saveCardTemplate(editingTpl)
    Admin.showToast('模板已保存', 'success')
    editingTpl = null
    selectedFieldIndices = []
    render()
  }

  // ---- Field selection (Ctrl/Cmd+click for multi-select) ----
  window.selectField = function(idx, e) {
    if (e && (e.ctrlKey || e.metaKey)) {
      const pos = selectedFieldIndices.indexOf(idx)
      if (pos >= 0) selectedFieldIndices.splice(pos, 1)
      else selectedFieldIndices.push(idx)
    } else {
      selectedFieldIndices = [idx]
    }
    renderEditor()
  }

  // ---- Canvas pointerdown (deselect) ----
  window.canvasMouseDown = function(e) {
    if (e.target.classList.contains('tpl-field')) return
    selectedFieldIndices = []
    renderEditor()
  }

  // ---- Field drag (pointer events + rAF + smart snapping) ----
  window.fieldMouseDown = function(e, idx) {
    e.preventDefault()
    // If not already in selection, select single; if in multi-selection, keep it
    if (!selectedFieldIndices.includes(idx)) {
      selectedFieldIndices = [idx]
    }
    dragFieldIdx = idx
    dragStartX = e.clientX
    dragStartY = e.clientY
    if (guideTimeoutId) { clearTimeout(guideTimeoutId); guideTimeoutId = null }
    const f = editingTpl.fields[idx]
    fieldStartX = f.x
    fieldStartY = f.y
    document.addEventListener('pointermove', onFieldDrag)
    document.addEventListener('pointerup', onFieldUp)
    renderEditor()
  }

  function getFieldDomSize(idx) {
    const el = document.querySelector('.tpl-field[data-idx="' + idx + '"]')
    if (el) {
      const r = el.getBoundingClientRect()
      const canvas = document.querySelector('.tpl-canvas')
      const cr = canvas ? canvas.getBoundingClientRect() : null
      if (cr) {
        return { w: (r.width / cr.width) * CANVAS_W, h: (r.height / cr.height) * CANVAS_H }
      }
    }
    const f = editingTpl.fields[idx]
    return { w: f.label.length * f.fontSize * 0.6, h: f.fontSize }
  }

  function onFieldDrag(e) {
    if (dragFieldIdx < 0) return
    if (rafId) return
    rafId = requestAnimationFrame(() => {
      rafId = null
      const dx = (e.clientX - dragStartX) / SCALE
      const dy = (e.clientY - dragStartY) / SCALE
      let nx = Math.round((fieldStartX + dx) / 10) * 10
      let ny = Math.round((fieldStartY + dy) / 10) * 10

      const f = editingTpl.fields[dragFieldIdx]
      const domSize = getFieldDomSize(dragFieldIdx)
      const fw = domSize.w
      const fh = domSize.h
      const fcx = nx + fw / 2
      const fcy = ny + fh / 2

      // Object-to-object smart snapping (8px threshold)
      snapGuideLines = []
      const allFields = editingTpl.fields
      for (let i = 0; i < allFields.length; i++) {
        if (i === dragFieldIdx || !allFields[i].visible) continue
        const o = allFields[i]
        const os = getFieldDomSize(i)
        const ow = os.w, oh = os.h
        const oright = o.x + ow, obottom = o.y + oh
        const ocy = o.y + oh / 2, ocx = o.x + ow / 2

        // X-axis snaps: left-to-left, center-to-center, right-to-right, left-to-right, right-to-left
        const xCandidates = [
          { myEdge: nx,        otherEdge: o.x,   type: 'left' },
          { myEdge: fcx,       otherEdge: ocx,   type: 'centerH' },
          { myEdge: nx + fw,   otherEdge: oright, type: 'right' },
          { myEdge: nx + fw,   otherEdge: o.x,   type: 'left' },   // my right to other left
          { myEdge: nx,        otherEdge: oright, type: 'right' }   // my left to other right
        ]
        // Y-axis snaps
        const yCandidates = [
          { myEdge: ny,        otherEdge: o.y,   type: 'top' },
          { myEdge: fcy,       otherEdge: ocy,   type: 'middle' },
          { myEdge: ny + fh,   otherEdge: obottom, type: 'bottom' },
          { myEdge: ny + fh,   otherEdge: o.y,   type: 'top' },    // my bottom to other top
          { myEdge: ny,        otherEdge: obottom, type: 'bottom' }  // my top to other bottom
        ]

        const SNAP = 8
        // Find best X snap (closest within threshold, edge priority over center)
        let bestX = null, bestXDist = SNAP + 1
        for (const c of xCandidates) {
          const dist = Math.abs(c.myEdge - c.otherEdge)
          const isEdge = c.type === 'left' || c.type === 'right'
          // edge snaps get priority: count as 0.7× distance vs center
          const weighted = isEdge ? dist * 0.7 : dist
          if (dist < SNAP && weighted < bestXDist) {
            bestX = { dist, target: c.otherEdge, offset: c.myEdge - nx }
            bestXDist = weighted
          }
        }
        // Find best Y snap
        let bestY = null, bestYDist = SNAP + 1
        for (const c of yCandidates) {
          const dist = Math.abs(c.myEdge - c.otherEdge)
          const isEdge = c.type === 'top' || c.type === 'bottom'
          const weighted = isEdge ? dist * 0.7 : dist
          if (dist < SNAP && weighted < bestYDist) {
            bestY = { dist, target: c.otherEdge, offset: c.myEdge - ny }
            bestYDist = weighted
          }
        }

        if (bestX && bestY) {
          // Both snap: apply X first if dist is smaller, else Y first
          if (bestXDist <= bestYDist) {
            nx = bestX.target - bestX.offset
            ny = bestY.target - bestY.offset
          } else {
            ny = bestY.target - bestY.offset
            nx = bestX.target - bestX.offset
          }
          snapGuideLines.push({ axis: 'x', pos: bestX.target })
          snapGuideLines.push({ axis: 'y', pos: bestY.target })
          break
        } else if (bestX) {
          nx = bestX.target - bestX.offset
          snapGuideLines.push({ axis: 'x', pos: bestX.target })
        } else if (bestY) {
          ny = bestY.target - bestY.offset
          snapGuideLines.push({ axis: 'y', pos: bestY.target })
        }
      }

      // Boundary clamp
      nx = Math.max(0, Math.min(CANVAS_W - fw, nx))
      ny = Math.max(0, Math.min(CANVAS_H - fh, ny))
      f.x = Math.round(nx)
      f.y = Math.round(ny)
      renderEditor()
    })
  }

  function onFieldUp() {
    dragFieldIdx = -1
    document.removeEventListener('pointermove', onFieldDrag)
    document.removeEventListener('pointerup', onFieldUp)
    // Fade out guide lines after release
    guideTimeoutId = setTimeout(() => { snapGuideLines = []; renderEditor(); guideTimeoutId = null }, 200)
  }

  // ---- Field property set ----
  window.setFieldProp = function(prop, value) {
    if (selectedFieldIndices.length !== 1 || !editingTpl || !editingTpl.fields) return
    editingTpl.fields[selectedFieldIndices[0]][prop] = value
    renderEditor()
  }

  // ---- Alignment ----
  window.alignFields = function(direction) {
    if (selectedFieldIndices.length < 2 || !editingTpl || !editingTpl.fields) return
    const fields = editingTpl.fields
    const sel = selectedFieldIndices.map(i => fields[i])
    switch (direction) {
      case 'left':
        const minX = Math.min(...sel.map(f => f.x))
        selectedFieldIndices.forEach(i => { fields[i].x = minX })
        break
      case 'centerH': {
        const avgX = Math.round(sel.reduce((s, f) => s + f.x + (f.width || f.label.length * f.fontSize * 0.6) / 2, 0) / sel.length)
        selectedFieldIndices.forEach(i => {
          const w = fields[i].width || fields[i].label.length * fields[i].fontSize * 0.6
          fields[i].x = Math.round(avgX - w / 2)
        })
        break
      }
      case 'right': {
        const maxR = Math.max(...sel.map(f => f.x + (f.width || f.label.length * f.fontSize * 0.6)))
        selectedFieldIndices.forEach(i => {
          const w = fields[i].width || fields[i].label.length * fields[i].fontSize * 0.6
          fields[i].x = Math.round(maxR - w)
        })
        break
      }
      case 'top':
        const minY = Math.min(...sel.map(f => f.y))
        selectedFieldIndices.forEach(i => { fields[i].y = minY })
        break
      case 'middle': {
        const avgY = Math.round(sel.reduce((s, f) => s + f.y + f.fontSize / 2, 0) / sel.length)
        selectedFieldIndices.forEach(i => { fields[i].y = Math.round(avgY - fields[i].fontSize / 2) })
        break
      }
      case 'bottom': {
        const maxB = Math.max(...sel.map(f => f.y + f.fontSize))
        selectedFieldIndices.forEach(i => { fields[i].y = Math.round(maxB - fields[i].fontSize) })
        break
      }
      case 'distributeH': {
        if (sel.length < 3) break
        const sorted = [...selectedFieldIndices].sort((a, b) => fields[a].x - fields[b].x)
        const first = fields[sorted[0]], last = fields[sorted[sorted.length - 1]]
        const firstW = first.width || first.label.length * first.fontSize * 0.6
        const totalSpace = (last.x) - (first.x + firstW)
        const gap = totalSpace / (sorted.length - 1)
        for (let i = 1; i < sorted.length - 1; i++) {
          fields[sorted[i]].x = Math.round(first.x + firstW + gap * i)
        }
        break
      }
    }
    renderEditor()
  }

  // ---- Global search ----
  window.onGlobalSearch = function() {}

  render()
})()
</script>
