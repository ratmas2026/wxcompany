<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>编辑核心业务 - Admin Panel</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/data.js"></script>
<script src="js/common.js"></script>
</head>
<body>
<div id="app"></div>

<script>
(async function() {
  Admin.init('business')
  await DataStore.init()

  const params = new URLSearchParams(window.location.search)
  const editId = params.get('id') ? parseInt(params.get('id')) : null
  const isEdit = !!editId

  let business = {
    id: null, name: '', icon: '📊', desc: '',
    advantages: [], process: [], pricing: [], images: []
  }
  let pendingImages = []

  if (isEdit) {
    const existing = DataStore.getBusiness(editId)
    if (existing) {
      business = { ...business, ...existing }
      business.advantages = [...(existing.advantages || [])]
      business.process = [...(existing.process || [])]
      business.pricing = (existing.pricing || []).map(p => ({ ...p, features: [...(p.features || [])] }))
    }
  }
  pendingImages = [...(business.images || [])]

  function render() {
    const advHTML = renderAdvantages()
    const procHTML = renderProcess()
    const priceHTML = renderPricing()
    const imageHTML = renderImages()

    const html = `
      <div class="page-header">
        <h1>${isEdit ? '编辑核心业务' : '新增核心业务'}</h1>
        <button class="btn btn-secondary" onclick="window.location.href='business.html'">← 返回</button>
      </div>

      <div class="card">
        <div class="card-header"><h3>基本信息</h3></div>
        <div class="card-body">
          <div class="form-group">
            <label class="form-label">名称 <span style="color:#e53e3e;">*</span></label>
            <input class="form-input" id="field_name" value="${escapeHtml(business.name)}" placeholder="请输入业务名称">
          </div>
          <div class="form-group">
            <label class="form-label">图标</label>
            <input class="form-input" id="field_icon" value="${escapeHtml(business.icon || '')}" placeholder="输入 emoji 图标，如 📐" style="max-width:200px;">
          </div>
          <div class="form-group">
            <label class="form-label">介绍</label>
            <textarea class="form-textarea" id="field_desc" placeholder="请输入业务介绍..." rows="4">${escapeHtml(business.desc || '')}</textarea>
          </div>
        </div>
      </div>

      ${advHTML}
      ${procHTML}
      ${priceHTML}

      <div class="card" style="margin-top:24px;">
        <div class="card-header">
          <h3>展示图片</h3>
          <span style="color:#718096;font-size:13px;">用于核心业务页面展示</span>
        </div>
        <div class="card-body">
          <div class="image-upload-area">
            ${imageHTML}
            <button class="btn btn-outline" onclick="document.getElementById('businessImageInput').click()">
              ${pendingImages.length > 0 ? '+ 添加图片' : '点击上传图片'}
            </button>
            <input type="file" id="businessImageInput" accept="image/jpeg,image/png,image/gif,image/webp" multiple style="display:none" onchange="window.onImagesSelected(this)">
          </div>
        </div>
      </div>

      <div style="margin-top:32px;display:flex;gap:12px;justify-content:center;">
        <button class="btn btn-secondary" onclick="window.location.href='business.html'">取消</button>
        <button class="btn btn-primary btn-lg" onclick="window.saveAll()">保存</button>
      </div>
    `

    Admin.setPageContent(html)
  }

  function renderAdvantages() {
    const items = (business.advantages || []).map((a, idx) => `
      <div class="sub-item-card">
        <div class="sub-item-header">
          <span>核心竞争力 #${idx + 1}</span>
          <button class="btn btn-danger btn-sm" onclick="window.removeAdvantage(${idx})">删除</button>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">图标</label>
            <input class="form-input adv-icon" data-idx="${idx}" value="${escapeHtml(a.icon || '')}" placeholder="🎨">
          </div>
          <div class="form-group">
            <label class="form-label">标题</label>
            <input class="form-input adv-title" data-idx="${idx}" value="${escapeHtml(a.title || '')}" placeholder="请输入标题">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">描述</label>
          <textarea class="form-textarea adv-desc" data-idx="${idx}" rows="2" placeholder="请输入描述">${escapeHtml(a.desc || '')}</textarea>
        </div>
      </div>
    `).join('')

    return `
      <div class="card" style="margin-top:24px;">
        <div class="card-header"><h3>核心竞争力</h3></div>
        <div class="card-body">
          <div id="advantagesContainer">${items || '<p style="color:#a0aec0;font-size:14px;">暂无条目，点击下方按钮添加</p>'}</div>
          <button class="btn btn-outline btn-sm" style="margin-top:12px;" onclick="window.addAdvantage()">+ 添加核心竞争力</button>
        </div>
      </div>
    `
  }

  function renderProcess() {
    const items = (business.process || []).map((p, idx) => `
      <div class="sub-item-card">
        <div class="sub-item-header">
          <span>服务流程 #${idx + 1}</span>
          <button class="btn btn-danger btn-sm" onclick="window.removeProcess(${idx})">删除</button>
        </div>
        <div class="form-group">
          <label class="form-label">标题</label>
          <input class="form-input proc-title" data-idx="${idx}" value="${escapeHtml(p.title || '')}" placeholder="请输入流程标题">
        </div>
        <div class="form-group">
          <label class="form-label">描述</label>
          <textarea class="form-textarea proc-desc" data-idx="${idx}" rows="2" placeholder="请输入流程描述">${escapeHtml(p.desc || '')}</textarea>
        </div>
      </div>
    `).join('')

    return `
      <div class="card" style="margin-top:24px;">
        <div class="card-header"><h3>服务流程</h3></div>
        <div class="card-body">
          <div id="processContainer">${items || '<p style="color:#a0aec0;font-size:14px;">暂无条目，点击下方按钮添加</p>'}</div>
          <button class="btn btn-outline btn-sm" style="margin-top:12px;" onclick="window.addProcess()">+ 添加服务流程</button>
        </div>
      </div>
    `
  }

  function renderPricing() {
    const items = (business.pricing || []).map((p, idx) => `
      <div class="sub-item-card">
        <div class="sub-item-header">
          <span>收费标准 #${idx + 1}</span>
          <button class="btn btn-danger btn-sm" onclick="window.removePricing(${idx})">删除</button>
        </div>
        <div class="form-row" style="grid-template-columns:1fr 1fr 1fr;">
          <div class="form-group">
            <label class="form-label">方案名称</label>
            <input class="form-input price-name" data-idx="${idx}" value="${escapeHtml(p.name || '')}" placeholder="基础方案">
          </div>
          <div class="form-group">
            <label class="form-label">价格</label>
            <input class="form-input price-val" data-idx="${idx}" value="${escapeHtml(p.price || '')}" placeholder="¥50">
          </div>
          <div class="form-group">
            <label class="form-label">单位</label>
            <input class="form-input price-unit" data-idx="${idx}" value="${escapeHtml(p.unit || '')}" placeholder="/㎡起">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">特性列表（逗号分隔）</label>
          <textarea class="form-textarea price-features" data-idx="${idx}" rows="2" placeholder="BIM建模, 碰撞检测, 施工图输出">${escapeHtml((p.features || []).join(', '))}</textarea>
        </div>
      </div>
    `).join('')

    return `
      <div class="card" style="margin-top:24px;">
        <div class="card-header"><h3>收费标准</h3></div>
        <div class="card-body">
          <div id="pricingContainer">${items || '<p style="color:#a0aec0;font-size:14px;">暂无条目，点击下方按钮添加</p>'}</div>
          <button class="btn btn-outline btn-sm" style="margin-top:12px;" onclick="window.addPricing()">+ 添加收费标准</button>
        </div>
      </div>
    `
  }

  function renderImages() {
    return pendingImages.map((url, idx) => `
      <div class="img-preview-item">
        <img src="${url}" class="img-preview-thumb" />
        <button class="img-remove-btn" onclick="window.removeImage(${idx})" title="移除">✕</button>
      </div>
    `).join('')
  }

  function escapeHtml(str) {
    return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
  }

  function syncFieldsToBusiness() {
    const nameEl = document.getElementById('field_name')
    if (nameEl) business.name = nameEl.value.trim()
    const iconEl = document.getElementById('field_icon')
    if (iconEl) business.icon = iconEl.value.trim()
    const descEl = document.getElementById('field_desc')
    if (descEl) business.desc = descEl.value

    // Collect advantages
    business.advantages = []
    document.querySelectorAll('.adv-icon').forEach(el => {
      const idx = parseInt(el.dataset.idx)
      if (!business.advantages[idx]) business.advantages[idx] = { icon: '', title: '', desc: '' }
      business.advantages[idx].icon = el.value
    })
    document.querySelectorAll('.adv-title').forEach(el => {
      const idx = parseInt(el.dataset.idx)
      if (!business.advantages[idx]) business.advantages[idx] = { icon: '', title: '', desc: '' }
      business.advantages[idx].title = el.value
    })
    document.querySelectorAll('.adv-desc').forEach(el => {
      const idx = parseInt(el.dataset.idx)
      if (!business.advantages[idx]) business.advantages[idx] = { icon: '', title: '', desc: '' }
      business.advantages[idx].desc = el.value
    })

    // Collect process
    business.process = []
    document.querySelectorAll('.proc-title').forEach(el => {
      const idx = parseInt(el.dataset.idx)
      if (!business.process[idx]) business.process[idx] = { title: '', desc: '' }
      business.process[idx].title = el.value
    })
    document.querySelectorAll('.proc-desc').forEach(el => {
      const idx = parseInt(el.dataset.idx)
      if (!business.process[idx]) business.process[idx] = { title: '', desc: '' }
      business.process[idx].desc = el.value
    })

    // Collect pricing
    business.pricing = []
    document.querySelectorAll('.price-name').forEach(el => {
      const idx = parseInt(el.dataset.idx)
      if (!business.pricing[idx]) business.pricing[idx] = { name: '', price: '', unit: '', features: [] }
      business.pricing[idx].name = el.value
    })
    document.querySelectorAll('.price-val').forEach(el => {
      const idx = parseInt(el.dataset.idx)
      if (!business.pricing[idx]) business.pricing[idx] = { name: '', price: '', unit: '', features: [] }
      business.pricing[idx].price = el.value
    })
    document.querySelectorAll('.price-unit').forEach(el => {
      const idx = parseInt(el.dataset.idx)
      if (!business.pricing[idx]) business.pricing[idx] = { name: '', price: '', unit: '', features: [] }
      business.pricing[idx].unit = el.value
    })
    document.querySelectorAll('.price-features').forEach(el => {
      const idx = parseInt(el.dataset.idx)
      if (!business.pricing[idx]) business.pricing[idx] = { name: '', price: '', unit: '', features: [] }
      business.pricing[idx].features = el.value.split(',').map(s => s.trim()).filter(Boolean)
    })
  }

  function collectAllFields() {
    syncFieldsToBusiness()
    return {
      id: business.id,
      name: business.name,
      icon: business.icon,
      desc: business.desc,
      advantages: business.advantages,
      process: business.process,
      pricing: business.pricing,
      images: pendingImages
    }
  }

  // Sub-item actions
  window.addAdvantage = function() {
    syncFieldsToBusiness()
    business.advantages.push({ icon: '', title: '', desc: '' })
    render()
  }

  window.removeAdvantage = function(idx) {
    syncFieldsToBusiness()
    business.advantages.splice(idx, 1)
    render()
  }

  window.addProcess = function() {
    syncFieldsToBusiness()
    business.process.push({ title: '', desc: '' })
    render()
  }

  window.removeProcess = function(idx) {
    syncFieldsToBusiness()
    business.process.splice(idx, 1)
    render()
  }

  window.addPricing = function() {
    syncFieldsToBusiness()
    business.pricing.push({ name: '', price: '', unit: '', features: [] })
    render()
  }

  window.removePricing = function(idx) {
    syncFieldsToBusiness()
    business.pricing.splice(idx, 1)
    render()
  }

  // Image upload
  window.onImagesSelected = async function(input) {
    const files = Array.from(input.files)
    if (!files.length) return
    syncFieldsToBusiness()
    for (const file of files) {
      if (file.size > 5 * 1048576) { Admin.showToast('图片 ' + file.name + ' 超过5MB，已跳过', 'error'); continue }
      try {
        Admin.showToast('正在上传 ' + file.name + ' ...', 'info')
        const url = await DataStore.uploadBusinessImage(file)
        pendingImages.push(url)
        Admin.showToast(file.name + ' 上传成功', 'success')
      } catch (err) {
        Admin.showToast(file.name + ' 上传失败: ' + err.message, 'error')
      }
    }
    input.value = ''
    render()
  }

  window.removeImage = function(idx) {
    syncFieldsToBusiness()
    pendingImages.splice(idx, 1)
    render()
  }

  window.saveAll = async function() {
    const data = collectAllFields()
    if (!data.name) { Admin.showToast('请输入业务名称', 'error'); return }

    try {
      await DataStore.saveBusiness(data)
      Admin.showToast(isEdit ? '已更新' : '已创建', 'success')
      setTimeout(() => { window.location.href = 'business.html' }, 800)
    } catch (err) {
      Admin.showToast('保存失败: ' + err.message, 'error')
    }
  }

  window.onGlobalSearch = function() {}

  render()
})()
</script>

<style>
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid #e2e8f0;
}
.card-header h3 {
  font-size: 16px;
  font-weight: 700;
  color: #1a202c;
}
.card-body { }
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 8px; }
.form-input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; color: #1a202c; background: #fff; box-sizing: border-box; }
.form-input:focus { outline: none; border-color: #3a5f94; box-shadow: 0 0 0 3px rgba(58,95,148,0.1); }
.form-textarea { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; line-height: 1.7; color: #1a202c; background: #fff; resize: vertical; font-family: inherit; box-sizing: border-box; }
.form-textarea:focus { outline: none; border-color: #3a5f94; box-shadow: 0 0 0 3px rgba(58,95,148,0.1); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.sub-item-card {
  background: #f7f9fb;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
}
.sub-item-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  font-size: 13px;
  font-weight: 600;
  color: #4a5568;
}
.image-upload-area { }
.img-preview-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
.img-preview-item { position: relative; width: 140px; height: 140px; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0; display: inline-block; margin-right: 12px; margin-bottom: 12px; }
.img-preview-thumb { width: 100%; height: 100%; object-fit: cover; }
.img-remove-btn { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; border-radius: 50%; border: none; background: rgba(0,0,0,0.6); color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.btn-lg { padding: 14px 48px; font-size: 16px; font-weight: 600; }
</style>
</body>
</html>
