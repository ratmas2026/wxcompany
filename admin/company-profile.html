<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>企业动态 - Admin Panel</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/data.js"></script>
<script src="js/common.js"></script>
</head>
<body>
<div id="app"></div>

<script>
(async function() {
  Admin.init('company-profile')
  await DataStore.init()

  let profiles = []
  let draggedIdx = null

  function render() {
    profiles = DataStore.getCompanyProfiles().sort((a, b) => (a.sortOrder || a.id) - (b.sortOrder || b.id))
    const config = DataStore.getCompanyProfileConfig()
    const sections = (config.sections || []).sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0))
    const hasOldFormat = profiles.some(p => !p.cover)

    const layoutLabel = { single: '📄 单张展示', 'horizontal-scroll': '🔄 左右滑动轮播', grid: '🔲 四宫格', hero: '📋 顶部栏', tab: '📑 Tab标签页' }

    const cards = profiles.map(p => `
      <div class="media-card">
        <div class="media-thumb" style="background:linear-gradient(135deg,#e8edf5,#dce3ef);">
          ${p.cover && p.cover.backgroundImage
            ? `<img src="${p.cover.backgroundImage}" style="width:100%;height:100%;object-fit:cover" alt="${escapeHtml(p.title)}">`
            : `<span style="font-size:48px">🏢</span>`}
        </div>
        <div class="media-body">
          <div class="media-title">${escapeHtml(p.title || '未命名')}</div>
          <div class="media-meta">
            <span>📅 ${p.createdAt || ''}</span>
            <span>🔢 排序: ${p.sortOrder || '-'}</span>
            ${p.detail ? `<span>${p.detail.detailEntry ? '🔗 可跳转' : '🚫 无跳转'}</span>` : ''}
          </div>
          <div class="media-actions">
            <button class="btn btn-outline btn-sm" onclick="window.location.href='company-profile-edit.html?id=${p.id}'">✏️ 编辑</button>
            <button class="btn btn-danger btn-sm" onclick="window.deleteProfile(${p.id})">🗑 删除</button>
          </div>
        </div>
      </div>
    `).join('')

    const circledDigits = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩']
    let nonHeroCount = 0

    // Count non-hero sections per layout type for suffix numbering
    const layoutCounts = {}
    sections.forEach(sec => {
      if (sec.displayLayout !== 'hero') {
        layoutCounts[sec.displayLayout] = (layoutCounts[sec.displayLayout] || 0) + 1
      }
    })
    const layoutSuffix = {}
    Object.keys(layoutCounts).forEach(k => { if (layoutCounts[k] > 1) layoutSuffix[k] = 0 })

    const sectionRows = sections.map((sec, idx) => {
      const selectedProfiles = sec.selectedIds.map(id => profiles.find(p => p.id === id)).filter(Boolean)
      const isHero = sec.displayLayout === 'hero'
      if (!isHero) nonHeroCount++
      const orderBadge = isHero
        ? '<span style="font-size:13px;color:#3a5f94;font-weight:700">📌</span>'
        : `<span style="font-size:14px;color:#3a5f94;font-weight:700">${circledDigits[nonHeroCount - 1] || nonHeroCount}</span>`
      const dragHandle = isHero
        ? ''
        : '<span style="cursor:grab;color:#a0aec0;font-size:16px;user-select:none;margin-right:6px" title="拖动排序">⠿</span>'
      const dragAttrs = isHero
        ? ''
        : `draggable="true" ondragstart="window.onSectionDragStart(event,${idx})" ondragover="window.onSectionDragOver(event)" ondrop="window.onSectionDrop(event,${idx})" ondragend="window.onSectionDragEnd(event)"`
      const cardNames = selectedProfiles.map(p => escapeHtml(p.title)).join('、') || '无'
      const statusOn = sec.status !== false
      // Build layout label with suffix if multiple of same type
      let layoutName = layoutLabel[sec.displayLayout] || sec.displayLayout
      if (!isHero && layoutSuffix[sec.displayLayout] !== undefined) {
        layoutSuffix[sec.displayLayout]++
        layoutName += layoutSuffix[sec.displayLayout]
      }
      return `
        <tr class="section-row" ${dragAttrs} data-idx="${idx}" style="${isHero ? '' : 'cursor:grab'}">
          <td style="white-space:nowrap">${dragHandle}${orderBadge}</td>
          <td style="font-weight:700;font-size:14px">${layoutName}</td>
          <td style="font-size:13px;color:#4a5568">${cardNames}</td>
          <td style="text-align:right">
            <label class="switch">
              <input type="checkbox" ${statusOn ? 'checked' : ''} onchange="window.toggleSection(${idx})">
              <span class="switch-slider"></span>
            </label>
          </td>
          <td style="text-align:center;white-space:nowrap">
            <button class="btn btn-outline btn-sm" onclick="window.editSection(${idx})">编辑</button>
            <button class="btn btn-danger btn-sm" onclick="window.deleteSection(${idx})">删除</button>
          </td>
        </tr>
      `
    }).join('')

    const sectionsHTML = sections.length > 0 ? `
      <div class="card" style="margin-top:24px;padding:20px 24px">
        <h3 style="margin:0 0 16px 0;font-size:16px">已保存的展示方案</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:60px">位置</th>
                <th>方案名称</th>
                <th>包含卡片</th>
                <th style="text-align:right;width:60px">状态</th>
                <th style="text-align:center;width:140px">操作</th>
              </tr>
            </thead>
            <tbody>${sectionRows}</tbody>
          </table>
        </div>
      </div>
    ` : ''

    const html = `
      <div class="page-header">
        <h1>企业动态</h1>
        <div style="display:flex;gap:10px">
          ${hasOldFormat ? '<button class="btn btn-warning btn-sm" onclick="window.runMigration()">🔄 迁移旧数据</button>' : ''}
          <button class="btn btn-secondary" onclick="window.showLayoutConfig()">⚙️ 展示设置</button>
          <button class="btn btn-primary" onclick="window.location.href='company-profile-edit.html'">+ 新增卡片</button>
        </div>
      </div>

      <div class="card-grid">
        ${cards || '<div class="empty-state"><div class="empty-icon">🏢</div><p>暂无企业动态内容</p><p style="font-size:13px;color:#a0aec0;margin-top:8px;">点击右上角「新增卡片」按钮添加</p></div>'}
      </div>

      ${sectionsHTML}
    `

    Admin.setPageContent(html)
  }

  function escapeHtml(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
  }

  window.deleteProfile = function(id) {
    const p = profiles.find(p => p.id === id)
    Admin.confirmDelete(`确定要删除 <strong>${escapeHtml(p?.title || '此项')}</strong> 吗？`, async () => {
      await DataStore.deleteCompanyProfile(id)
      Admin.showToast('删除成功', 'success')
      render()
    })
  }

  window.deleteSection = function(idx) {
    const config = DataStore.getCompanyProfileConfig()
    const sections = [...(config.sections || [])].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0))
    const sec = sections[idx]
    const selectedNames = (sec.selectedIds || []).map(id => {
      const p = profiles.find(p => p.id === id)
      return p ? p.title : ''
    }).filter(Boolean).join('、')
    Admin.confirmDelete(`确定要删除展示方案 <strong>${selectedNames || '此项'}</strong> 吗？`, async () => {
      sections.splice(idx, 1)
      await DataStore.updateCompanyProfileConfig({ sections })
      Admin.showToast('方案已删除', 'success')
      render()
    })
  }

  window.onSectionDragStart = function(event, idx) {
    draggedIdx = idx
    event.target.style.opacity = '0.4'
    event.dataTransfer.effectAllowed = 'move'
  }

  window.onSectionDragOver = function(event) {
    event.preventDefault()
    event.dataTransfer.dropEffect = 'move'
    document.querySelectorAll('.section-row').forEach(r => r.style.borderTop = '')
    const row = event.target.closest('.section-row')
    if (row) {
      row.style.borderTop = '3px solid #3a5f94'
    }
  }

  window.onSectionDrop = async function(event, targetIdx) {
    event.preventDefault()
    document.querySelectorAll('.section-row').forEach(r => r.style.borderTop = '')
    if (draggedIdx === null || draggedIdx === targetIdx) { draggedIdx = null; return }

    const config = DataStore.getCompanyProfileConfig()
    const sections = [...(config.sections || [])].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0))

    // Prevent dropping onto hero or dragging hero
    if (sections[targetIdx].displayLayout === 'hero') { draggedIdx = null; return }
    if (sections[draggedIdx].displayLayout === 'hero') { draggedIdx = null; return }

    // Move the dragged item to target position
    const [moved] = sections.splice(draggedIdx, 1)
    sections.splice(targetIdx, 0, moved)

    // Renumber all non-hero sections
    let order = 10
    sections.forEach(sec => {
      if (sec.displayLayout !== 'hero') {
        sec.sortOrder = order
        order += 10
      }
    })

    await DataStore.updateCompanyProfileConfig({ sections })
    draggedIdx = null
    render()
  }

  window.onSectionDragEnd = function(event) {
    event.target.style.opacity = ''
    document.querySelectorAll('.section-row').forEach(r => r.style.borderTop = '')
    draggedIdx = null
  }

  window.toggleSection = async function(idx) {
    const config = DataStore.getCompanyProfileConfig()
    const sections = [...(config.sections || [])].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0))
    const sec = sections[idx]
    sec.status = sec.status === false ? true : false
    await DataStore.updateCompanyProfileConfig({ sections })
    Admin.showToast('状态已更新', 'success')
    render()
  }

  window.editSection = function(idx) {
    const config = DataStore.getCompanyProfileConfig()
    const sections = [...(config.sections || [])].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0))
    const sec = sections[idx]
    if (!sec) return
    // Remove this section, pre-select its cards and layout for re-creation
    sections.splice(idx, 1)
    DataStore.updateCompanyProfileConfig({ sections })
    // Open layout config with this section's cards and full config pre-selected
    showLayoutConfigForEdit(sec.selectedIds || [], sec.displayLayout, sec)
  }

  window.showLayoutConfig = function() {
    showLayoutConfigForEdit([], null)
  }

  function showLayoutConfigForEdit(preSelected, preLayout, preSection) {
    const config = DataStore.getCompanyProfileConfig()
    const sorted = [...profiles]
    let selectionOrder = [...(preSelected || [])]

    // 收集已被其他分区使用的卡片 ID（编辑模式下排除自身）
    const allSections = config.sections || []
    const usedIds = []
    allSections.forEach(function(sec) {
      if (preSection && sec.id === preSection.id) return
      usedIds.push.apply(usedIds, sec.selectedIds || [])
    })

    function showCardSelect() {
      const cardList = sorted.map(p => {
        const isUsed = usedIds.includes(p.id)
        const checked = selectionOrder.includes(p.id) ? 'checked' : ''
        const orderNum = selectionOrder.indexOf(p.id)
        const orderBadge = orderNum >= 0 ? `<span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:700;margin-left:8px">${orderNum + 1}</span>` : ''
        const disabledAttr = isUsed ? 'disabled' : ''
        const usedLabel = isUsed ? '<span style="font-size:11px;color:#e53e3e;margin-left:8px">已使用</span>' : ''
        const cursorStyle = isUsed ? 'cursor:not-allowed' : 'cursor:pointer'
        const opacityStyle = isUsed ? 'opacity:0.5' : ''
        const borderColor = checked ? 'var(--primary)' : (isUsed ? '#fed7d7' : '#e2e8f0')
        const bgColor = checked ? '#e8f0fe' : (isUsed ? '#fff5f5' : '#f8f9fa')
        return `
          <label style="display:flex;align-items:center;gap:12px;padding:12px 16px;margin-bottom:8px;border-radius:8px;${cursorStyle};border:2px solid ${borderColor};background:${bgColor};${opacityStyle}">
            <input type="checkbox" value="${p.id}" class="card-select-cb" ${checked} ${disabledAttr} onchange="window.onCardSelect(${p.id}, this.checked)" style="width:18px;height:18px;cursor:pointer">
            <div style="flex:1">
              <div style="font-weight:600;font-size:14px;display:flex;align-items:center">${escapeHtml(p.title || '未命名')}${orderBadge}${usedLabel}</div>
              <div style="font-size:11px;color:#718096">排序: ${p.sortOrder || '-'} | ${p.createdAt || ''}</div>
            </div>
          </label>
        `
      }).join('')

      Admin.showModal('选择展示卡片',
        `<p style="font-size:13px;color:#718096;margin-bottom:16px">勾选卡片并按先后顺序排列（最多4张），先选的排在前面</p>
        <div style="max-height:400px;overflow-y:auto">${cardList}</div>`,
        () => {
          if (!selectionOrder.length) {
            Admin.showToast('请至少选择一张卡片', 'info')
            return
          }
          if (preLayout === 'tab') {
            setTimeout(() => showTabConfig(preSection), 100)
          } else if (selectionOrder.length === 1) {
            setTimeout(() => showLayoutChooseSingle(), 100)
          } else {
            setTimeout(() => showLayoutChoose(), 100)
          }
        }, '下一步'
      )
    }

    async function saveSection(layout, tabConfig) {
      // Reorder selected cards
      const orders = []
      selectionOrder.forEach((id, idx) => orders.push({ id, sortOrder: idx + 1 }))
      let nextSort = selectionOrder.length + 1
      sorted.forEach(p => {
        if (!selectionOrder.includes(p.id)) orders.push({ id: p.id, sortOrder: nextSort++ })
      })
      await DataStore.reorderCompanyProfiles(orders)

      // Remove selected cards from all existing sections
      let sections = (config.sections || []).map(sec => ({
        ...sec,
        selectedIds: sec.selectedIds.filter(id => !selectionOrder.includes(id))
      }))

      // Collect orphaned single cards from multi-card sections down to 1
      const orphanSingleIds = []
      sections = sections.filter(sec => {
        if (sec.selectedIds.length === 0) return false
        if ((sec.displayLayout === 'horizontal-scroll' || sec.displayLayout === 'grid' || sec.displayLayout === 'tab') && sec.selectedIds.length === 1) {
          orphanSingleIds.push(sec.selectedIds[0])
          return false
        }
        return true
      })

      // Merge all single cards into one pool
      const existingSingle = sections.find(sec => sec.displayLayout === 'single')
      sections = sections.filter(sec => sec.displayLayout !== 'single')
      const singlePool = [...(existingSingle ? existingSingle.selectedIds : []), ...orphanSingleIds]

      // Determine next sortOrder for the new section
      const maxOrder = sections.reduce((max, s) => Math.max(max, s.sortOrder || 0), 10)

      // Add new section(s). Single layout: one section per card
      if (layout === 'hero') {
        sections.push({ id: 's' + Date.now(), displayLayout: 'hero', selectedIds: [...selectionOrder], sortOrder: 0, status: true })
        singlePool.forEach((id, i) => {
          sections.push({ id: 's' + Date.now() + '_' + i, displayLayout: 'single', selectedIds: [id], sortOrder: maxOrder + 10 + i * 10, status: true })
        })
      } else if (layout === 'single') {
        selectionOrder.forEach((id, i) => {
          sections.push({ id: 's' + Date.now() + '_' + i, displayLayout: 'single', selectedIds: [id], sortOrder: maxOrder + 10 + i * 10, status: true })
        })
        singlePool.forEach((id, i) => {
          sections.push({ id: 's' + Date.now() + '_s' + i, displayLayout: 'single', selectedIds: [id], sortOrder: maxOrder + 10 + (selectionOrder.length + i) * 10, status: true })
        })
      } else if (layout === 'tab') {
        const tc = tabConfig || {}
        sections.push({
          id: 's' + Date.now(),
          displayLayout: 'tab',
          selectedIds: [...selectionOrder],
          sortOrder: maxOrder + 10,
          status: true,
          tabLayout: tc.tabLayout || 'scroll',
          tabPerPage: tc.tabPerPage || 1,
          tabTitleSource: tc.tabTitleSource || 'card',
          tabLabels: tc.tabLabels || []
        })
        singlePool.forEach((id, i) => {
          sections.push({ id: 's' + Date.now() + '_' + i, displayLayout: 'single', selectedIds: [id], sortOrder: maxOrder + 20 + i * 10, status: true })
        })
      } else {
        sections.push({ id: 's' + Date.now(), displayLayout: layout, selectedIds: [...selectionOrder], sortOrder: maxOrder + 10, status: true })
        singlePool.forEach((id, i) => {
          sections.push({ id: 's' + Date.now() + '_' + i, displayLayout: 'single', selectedIds: [id], sortOrder: maxOrder + 20 + i * 10, status: true })
        })
      }

      await DataStore.updateCompanyProfileConfig({ sections })
      Admin.showToast('展示方案已保存', 'success')
      render()
    }

    function showLayoutChoose() {
      const sel = preLayout || 'horizontal-scroll'
      const isSelected = v => v === sel ? 'checked' : ''
      const isBorder = v => v === sel ? '2px solid var(--primary)' : '2px solid #e2e8f0'
      const showTabOption = selectionOrder.length > 2
      Admin.showModal('选择展示布局', `
        <div class="form-group">
          <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap" id="layoutOptions">
            <label class="layout-option" data-value="horizontal-scroll" onclick="window.selectLayout(this)" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:12px 16px;border:${isBorder('horizontal-scroll')};border-radius:8px;flex:1;min-width:140px">
              <input type="radio" name="layout" value="horizontal-scroll" ${isSelected('horizontal-scroll')} style="display:none">
              <span>🔄</span>
              <span style="font-weight:600">左右滑动轮播</span>
            </label>
            <label class="layout-option" data-value="grid" onclick="window.selectLayout(this)" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:12px 16px;border:${isBorder('grid')};border-radius:8px;flex:1;min-width:140px">
              <input type="radio" name="layout" value="grid" ${isSelected('grid')} style="display:none">
              <span>🔲</span>
              <span style="font-weight:600">四宫格 (2×2)</span>
            </label>
            ${showTabOption ? `
            <label class="layout-option" data-value="tab" onclick="window.selectLayout(this)" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:12px 16px;border:${isBorder('tab')};border-radius:8px;flex:1;min-width:140px">
              <input type="radio" name="layout" value="tab" ${isSelected('tab')} style="display:none">
              <span>📑</span>
              <span style="font-weight:600">Tab标签页</span>
            </label>
            ` : ''}
          </div>
        </div>
      `, async () => {
        const selectedLayout = document.querySelector('input[name="layout"]:checked')
        const layout = selectedLayout ? selectedLayout.value : 'horizontal-scroll'
        if (layout === 'tab') {
          setTimeout(() => showTabConfig(null), 100)
        } else {
          await saveSection(layout)
        }
      }, '保存')
    }

    function showTabConfig(preSection) {
      const existing = preSection || {}
      const tabLayout = existing.tabLayout || 'scroll'
      const tabTitleSource = existing.tabTitleSource || 'card'
      const existingLabels = existing.tabLabels || []

      function renderTabConfig() {
        const selLayout = v => v === tabLayout ? 'checked' : ''
        const selSource = v => v === tabTitleSource ? 'checked' : ''
        const tabCount = selectionOrder.length
        let customLabelsHTML = ''
        if (tabTitleSource === 'custom') {
          for (let i = 0; i < tabCount; i++) {
            const card = sorted.find(p => p.id === selectionOrder[i])
            const defaultLabel = existingLabels[i] || (card ? card.title : '')
            customLabelsHTML += '<div class="form-group"><label>标签' + (i + 1) + '名称</label>' +
              '<input class="form-input tab-custom-label" value="' + escapeHtml(defaultLabel) + '" placeholder="请输入标签名称"></div>'
          }
        }
        return `
          <div class="form-group">
            <label style="font-weight:700;margin-bottom:8px;display:block">Tab布局方式</label>
            <div style="display:flex;gap:12px">
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:10px 16px;border:2px solid ${tabLayout === 'scroll' ? 'var(--primary)' : '#e2e8f0'};border-radius:8px;flex:1" onclick="window.selectTabConfigRadio(this,'tabLayout','scroll')">
                <input type="radio" name="tabLayout" value="scroll" ${selLayout('scroll')} style="display:none">
                <span style="font-weight:600">↔ 横向滚动</span>
              </label>
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:10px 16px;border:2px solid ${tabLayout === 'fixed' ? 'var(--primary)' : '#e2e8f0'};border-radius:8px;flex:1" onclick="window.selectTabConfigRadio(this,'tabLayout','fixed')">
                <input type="radio" name="tabLayout" value="fixed" ${selLayout('fixed')} style="display:none">
                <span style="font-weight:600">📐 固定分页</span>
              </label>
            </div>
          </div>
          <div class="form-group">
            <label style="font-weight:700;margin-bottom:8px;display:block">Tab标题来源</label>
            <div style="display:flex;gap:12px">
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:10px 16px;border:2px solid ${tabTitleSource === 'card' ? 'var(--primary)' : '#e2e8f0'};border-radius:8px;flex:1" onclick="window.selectTabConfigRadio(this,'tabTitleSource','card')">
                <input type="radio" name="tabTitleSource" value="card" ${selSource('card')} style="display:none">
                <span style="font-weight:600">🃏 卡片标题</span>
              </label>
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:10px 16px;border:2px solid ${tabTitleSource === 'custom' ? 'var(--primary)' : '#e2e8f0'};border-radius:8px;flex:1" onclick="window.selectTabConfigRadio(this,'tabTitleSource','custom')">
                <input type="radio" name="tabTitleSource" value="custom" ${selSource('custom')} style="display:none">
                <span style="font-weight:600">✏️ 自定义分类</span>
              </label>
            </div>
          </div>
          <div id="tabCustomLabelContainer" style="display:${tabTitleSource === 'custom' ? 'block' : 'none'}">
            ${customLabelsHTML}
          </div>
        `
      }

      Admin.showModal('Tab标签页配置', renderTabConfig(), async () => {
        const layoutEl = document.querySelector('input[name="tabLayout"]:checked')
        const sourceEl = document.querySelector('input[name="tabTitleSource"]:checked')
        const tabConfig = {
          tabLayout: layoutEl ? layoutEl.value : 'scroll',
          tabPerPage: 1,
          tabTitleSource: sourceEl ? sourceEl.value : 'card',
          tabLabels: []
        }
        if (tabConfig.tabTitleSource === 'custom') {
          const labelInputs = document.querySelectorAll('.tab-custom-label')
          labelInputs.forEach(inp => tabConfig.tabLabels.push(inp.value || ''))
        }
        await saveSection('tab', tabConfig)
      }, '保存')
    }

    window.selectTabConfigRadio = function(el, name, value) {
      // Update the closure variable so re-render reflects new state
      // We use a different approach: update DOM directly and track state via DOM
      const container = el.closest('.form-group')
      if (container) {
        container.querySelectorAll('label').forEach(lbl => {
          lbl.style.border = '2px solid #e2e8f0'
          const radio = lbl.querySelector('input')
          if (radio) radio.checked = false
        })
      }
      el.style.border = '2px solid var(--primary)'
      const radio = el.querySelector('input')
      if (radio) radio.checked = true

      // Update custom labels visibility if tabTitleSource changed
      if (name === 'tabTitleSource') {
        const labelContainer = document.getElementById('tabCustomLabelContainer')
        if (labelContainer) {
          labelContainer.style.display = value === 'custom' ? 'block' : 'none'
          if (value === 'custom' && !labelContainer.innerHTML.trim()) {
            // Rebuild label inputs on first show
            const tabCount = selectionOrder.length
            let html = ''
            for (let i = 0; i < tabCount; i++) {
              const card = sorted.find(p => p.id === selectionOrder[i])
              const defaultLabel = card ? card.title : ''
              html += '<div class="form-group"><label>标签' + (i + 1) + '名称</label>' +
                '<input class="form-input tab-custom-label" value="' + escapeHtml(defaultLabel) + '" placeholder="请输入标签名称"></div>'
            }
            labelContainer.innerHTML = html
          }
        }
      }
    }

    function showLayoutChooseSingle() {
      const sel = preLayout || 'single'
      const isSelected = v => v === sel ? 'checked' : ''
      const isBorder = v => v === sel ? '2px solid var(--primary)' : '2px solid #e2e8f0'
      Admin.showModal('选择展示布局', `
        <div class="form-group">
          <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap" id="layoutOptions">
            <label class="layout-option" data-value="single" onclick="window.selectLayout(this)" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:12px 16px;border:${isBorder('single')};border-radius:8px;flex:1;min-width:140px">
              <input type="radio" name="layout" value="single" ${isSelected('single')} style="display:none">
              <span>📄</span>
              <span style="font-weight:600">单张展示</span>
            </label>
            <label class="layout-option" data-value="hero" onclick="window.selectLayout(this)" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:12px 16px;border:${isBorder('hero')};border-radius:8px;flex:1;min-width:140px">
              <input type="radio" name="layout" value="hero" ${isSelected('hero')} style="display:none">
              <span>📋</span>
              <span style="font-weight:600">顶部栏</span>
            </label>
          </div>
        </div>
      `, async () => {
        const selectedLayout = document.querySelector('input[name="layout"]:checked')
        const layout = selectedLayout ? selectedLayout.value : 'single'
        await saveSection(layout)
      }, '保存')
    }

    window.selectLayout = function(el) {
      const options = document.querySelectorAll('.layout-option')
      options.forEach(opt => {
        opt.style.border = '2px solid #e2e8f0'
        opt.querySelector('input').checked = false
      })
      el.style.border = '2px solid var(--primary)'
      el.querySelector('input').checked = true
    }

    window.onCardSelect = function(id, checked) {
      if (checked && usedIds.includes(id)) {
        Admin.showToast('该卡片已在其他方案中使用', 'info')
        const modal = document.querySelector('.modal')
        if (modal) {
          const cb = modal.querySelector('.card-select-cb[value="' + id + '"]')
          if (cb) cb.checked = false
        }
        return
      }
      if (checked) {
        if (selectionOrder.length >= 4) {
          Admin.showToast('最多选择4张卡片', 'info')
          // Uncheck the checkbox that was just checked
          const modal = document.querySelector('.modal')
          if (modal) {
            const cb = modal.querySelector('.card-select-cb[value="' + id + '"]')
            if (cb) cb.checked = false
          }
          return
        }
        selectionOrder.push(id)
      } else {
        selectionOrder = selectionOrder.filter(x => x !== id)
      }
      const modal = document.querySelector('.modal')
      if (modal) {
        const atLimit = selectionOrder.length >= 4
        modal.querySelectorAll('.card-select-cb').forEach(cb => {
          const pid = parseInt(cb.value)
          const label = cb.closest('label')
          const isChecked = cb.checked
          label.style.border = isChecked ? '2px solid var(--primary)' : '2px solid #e2e8f0'
          label.style.background = isChecked ? '#e8f0fe' : '#f8f9fa'
          // Disable unchecked checkboxes when at limit
          if (!isChecked && atLimit) {
            cb.disabled = true
            label.style.opacity = '0.4'
          } else {
            cb.disabled = false
            label.style.opacity = '1'
          }
          const orderIdx = selectionOrder.indexOf(pid)
          let badge = label.querySelector('.order-badge')
          if (orderIdx >= 0) {
            if (!badge) {
              badge = document.createElement('span')
              badge.className = 'order-badge'
              badge.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:700;margin-left:8px'
              label.querySelector('div > div').appendChild(badge)
            }
            badge.textContent = orderIdx + 1
          } else if (badge) {
            badge.remove()
          }
        })
      }
    }

    showCardSelect()
  }

  window.runMigration = function() {
    Admin.confirmDelete('确定要将旧格式的企业动态数据迁移到新的卡片格式吗？此操作安全且可重复执行。', async () => {
      Admin.showToast('正在迁移...', 'info')
      const result = await DataStore.migrateCompanyProfiles()
      Admin.showToast(`迁移完成，已处理 ${result.migrated} 条`, 'success')
      render()
    })
  }

  window.onGlobalSearch = function() {}

  render()
})()
</script>
</body>
</html>
