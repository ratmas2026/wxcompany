<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>登录 - Admin Panel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a3a4a 0%, #2c5f7a 50%, #3a5f94 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%; max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .login-card h1 {
    text-align: center;
    font-size: 28px;
    color: #1a3a4a;
    margin-bottom: 8px;
  }
  .login-card .subtitle {
    text-align: center;
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 36px;
  }
  .form-group {
    margin-bottom: 24px;
  }
  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 16px;
    color: #1e293b;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-group input:focus {
    border-color: #3a5f94;
  }
  .login-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #1a3a4a, #3a5f94);
    color: #ffffff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.9; }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg {
    color: #ef4444;
    font-size: 14px;
    text-align: center;
    margin-top: 16px;
    display: none;
  }
</style>
</head>
<body>
<div class="login-card">
  <h1>Admin Panel</h1>
  <p class="subtitle">企业展示管理后台</p>
  <form id="loginForm">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <button type="submit" class="login-btn" id="loginBtn">登 录</button>
  </form>
  <p class="error-msg" id="errorMsg"></p>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault()
  const btn = document.getElementById('loginBtn')
  const error = document.getElementById('errorMsg')
  btn.disabled = true
  btn.textContent = '登录中...'
  error.style.display = 'none'

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    })
    const data = await res.json()
    if (data.ok) {
      sessionStorage.setItem('admin_token', data.token)
      window.location.href = 'index.html'
    } else {
      error.textContent = data.error || '登录失败'
      error.style.display = 'block'
    }
  } catch (err) {
    error.textContent = '网络错误，请稍后重试'
    error.style.display = 'block'
  }
  btn.disabled = false
  btn.textContent = '登 录'
})
</script>
</body>
</html>
