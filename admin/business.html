<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>核心业务 - Admin Panel</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/data.js"></script>
<script src="js/common.js"></script>
</head>
<body>
<div id="app"></div>

<script>
(async function() {
  Admin.init('business')
  await DataStore.init()

  let items = []

  function render() {
    items = DataStore.getBusinessList()

    const cards = items.map(b => `
      <div class="media-card">
        <div class="media-thumb" style="background:linear-gradient(135deg,#e8edf5,#dce3ef);">
          ${b.images && b.images.length > 0
            ? `<img src="${b.images[0]}" style="width:100%;height:100%;object-fit:cover" alt="${b.name}">`
            : `<span style="font-size:48px">${b.icon || '📊'}</span>`}
        </div>
        <div class="media-body">
          <div class="media-title">${escapeHtml(b.icon || '')} ${escapeHtml(b.name || '未命名')}</div>
          <div class="media-meta">
            <span style="display:block;margin-top:4px;color:#4a5568;font-size:13px;line-height:1.5;">${escapeHtml((b.desc || '').substring(0, 80))}...</span>
          </div>
          <div class="media-actions">
            <button class="btn btn-outline btn-sm" onclick="window.location.href='business-edit.html?id=${b.id}'">✏️ 编辑</button>
            <button class="btn btn-danger btn-sm" onclick="window.deleteItem(${b.id})">🗑 删除</button>
          </div>
        </div>
      </div>
    `).join('')

    const html = `
      <div class="page-header">
        <h1>核心业务</h1>
        <button class="btn btn-primary" onclick="window.location.href='business-edit.html'">+ 新增</button>
      </div>

      <div class="card-grid">
        ${cards || '<div class="empty-state"><div class="empty-icon">📊</div><p>暂无核心业务</p><p style="font-size:13px;color:#a0aec0;margin-top:8px;">点击右上角「新增」按钮添加核心业务</p></div>'}
      </div>
    `

    Admin.setPageContent(html)
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
  }

  window.deleteItem = function(id) {
    const b = items.find(b => b.id === id)
    Admin.confirmDelete(`确定要删除 <strong>${escapeHtml(b?.name || '此项')}</strong> 吗？`, async () => {
      await DataStore.deleteBusiness(id)
      Admin.showToast('删除成功', 'success')
      render()
    })
  }

  window.onGlobalSearch = function() {}

  render()
})()
</script>
</body>
</html>
