<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>施工现场 - Admin Panel</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/data.js"></script>
<script src="js/common.js"></script>
</head>
<body>
<div id="app"></div>

<script>
(async function() {
  Admin.init('sites')
  await DataStore.init()

  let items = []

  function render() {
    items = DataStore.getSitesList()

    const cards = items.map(s => `
      <div class="media-card">
        <div class="media-thumb" style="background:linear-gradient(135deg,#fef7e0,#fdebc8);">
          ${s.image
            ? `<img src="${s.image}" style="width:100%;height:100%;object-fit:cover" alt="${escapeHtml(s.projectName || s.name)}">`
            : `<span style="font-size:48px">🏗️</span>`}
        </div>
        <div class="media-body">
          <div class="media-title">${escapeHtml(s.projectName || s.name || '未命名')}</div>
          <div class="media-meta">
            ${s.location ? `<span style="display:block;color:#4a5568;font-size:13px;">📍 ${escapeHtml(s.location)}</span>` : ''}
            <span style="display:block;margin-top:4px;color:#4a5568;font-size:13px;">🚧 ${escapeHtml(s.stage || '未知阶段')}</span>
            ${s.desc ? `<span style="display:block;margin-top:4px;color:#718096;font-size:12px;line-height:1.5;">${escapeHtml(s.desc.substring(0, 60))}${s.desc.length > 60 ? '...' : ''}</span>` : ''}
          </div>
          <div class="media-actions">
            <button class="btn btn-outline btn-sm" onclick="window.location.href='sites-edit.html?id=${s.id}'">✏️ 编辑</button>
            <button class="btn btn-danger btn-sm" onclick="window.deleteItem(${s.id})">🗑 删除</button>
          </div>
        </div>
      </div>
    `).join('')

    const html = `
      <div class="page-header">
        <h1>施工现场</h1>
        <button class="btn btn-primary" onclick="window.location.href='sites-edit.html'">+ 新增</button>
      </div>

      <div class="card-grid">
        ${cards || '<div class="empty-state"><div class="empty-icon">🏗️</div><p>暂无施工现场</p><p style="font-size:13px;color:#a0aec0;margin-top:8px;">点击右上角「新增」按钮添加施工现场</p></div>'}
      </div>
    `

    Admin.setPageContent(html)
  }

  function escapeHtml(str) {
    return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
  }

  window.deleteItem = function(id) {
    const s = items.find(s => s.id === id)
    Admin.confirmDelete(`确定要删除 <strong>${escapeHtml(s?.projectName || s?.name || '此项')}</strong> 吗？`, async () => {
      await DataStore.deleteSite(id)
      Admin.showToast('删除成功', 'success')
      render()
    })
  }

  window.onGlobalSearch = function() {}

  render()
})()
</script>
</body>
</html>
