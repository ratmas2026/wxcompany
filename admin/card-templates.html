<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>名片模板 - Admin Panel</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/data.js"></script>
<script src="js/common.js"></script>
</head>
<body>
<div id="app"></div>
<input type="file" id="templateFileInput" accept=".html,.htm,.txt" style="display:none">

<script>
(async function() {
  Admin.init('card-templates')
  Admin.track('page_view', { page: 'card-templates' })

  let templates = []
  let cards = []

  async function loadData() {
    try {
      const tRes = await DataStore.getTemplates()
      templates = (tRes && tRes.templates) || []
    } catch (e) { templates = [] }
    cards = DataStore.getCards()
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B'
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB'
    return (bytes / 1048576).toFixed(1) + ' MB'
  }

  function formatDate(iso) {
    if (!iso) return ''
    return iso.split('T')[0]
  }

  function getTypeBadge(mimeType) {
    if (mimeType === 'text/plain') return '<span class="badge badge-info">TXT</span>'
    return '<span class="badge badge-neutral">HTML</span>'
  }

  function render() {
    let bodyHTML

    if (templates.length === 0) {
      bodyHTML = `
        <div class="upload-zone" id="uploadZone" style="margin-top:0">
          <div class="upload-icon">&#128196;</div>
          <p style="font-size:16px;font-weight:600;color:var(--on-surface);margin-bottom:6px">拖拽 HTML 或 TXT 文件到此处</p>
          <p style="font-size:12px;color:var(--outline)">或点击选择文件 · 支持 .html / .txt · 最大 500KB</p>
        </div>`
    } else {
      const gridItems = templates.map(function(t) {
        return `
        <div class="template-card">
          <div class="template-card-header">
            ${getTypeBadge(t.mime_type)}
            <span class="template-card-name">${Admin._escapeHTML(t.name)}</span>
          </div>
          <div class="template-card-preview">
            <iframe sandbox="allow-scripts allow-same-origin" srcdoc="" data-id="${t.id}" loading="lazy"></iframe>
          </div>
          <div class="template-card-meta-row">
            <span>${formatSize(t.size)}</span>
            <span>${formatDate(t.created_at)}</span>
          </div>
          <div class="template-card-actions">
            <button class="btn btn-sm btn-outline" onclick="previewTemplate(${t.id})">预览</button>
            <button class="btn btn-sm btn-outline" onclick="openInNewTab(${t.id})">新窗口</button>
            <button class="btn btn-sm btn-outline" onclick="viewSource(${t.id})">源码</button>
            <button class="btn btn-sm btn-outline" onclick="downloadTemplate(${t.id})">下载</button>
            <button class="btn btn-sm btn-outline" style="color:var(--error);border-color:var(--error)" onclick="deleteTemplate(${t.id})">删除</button>
          </div>
        </div>`
      }).join('')

      bodyHTML = `
        <div class="upload-zone upload-zone--compact" id="uploadZone">
          <span class="upload-icon" style="font-size:24px">&#128196;</span>
          <span style="font-size:13px;color:var(--on-surface-variant)">拖拽文件到此处上传 · 支持 .html / .txt · 最大 500KB</span>
        </div>
        <div class="template-grid">${gridItems}</div>`
    }

    Admin.setPageContent(`
      <div class="page-header">
        <h1>名片模板</h1>
        <div class="toolbar-right">
          <button class="btn btn-primary" id="uploadBtn">+ 上传模板</button>
        </div>
      </div>
      ${bodyHTML}
    `)

    // Upload button
    var uploadBtn = document.getElementById('uploadBtn')
    if (uploadBtn) {
      uploadBtn.addEventListener('click', function() {
        document.getElementById('templateFileInput').click()
      })
    }

    // Upload zone
    var zone = document.getElementById('uploadZone')
    if (zone) {
      zone.addEventListener('click', function(e) {
        if (e.target.tagName === 'BUTTON') return
        document.getElementById('templateFileInput').click()
      })
      zone.addEventListener('dragover', function(e) {
        e.preventDefault()
        zone.classList.add('upload-zone--active')
      })
      zone.addEventListener('dragleave', function() {
        zone.classList.remove('upload-zone--active')
      })
      zone.addEventListener('drop', function(e) {
        e.preventDefault()
        zone.classList.remove('upload-zone--active')
        var file = e.dataTransfer.files[0]
        if (file) handleUpload(file)
      })
    }

    // Lazy-load preview iframes
    var previewIframes = document.querySelectorAll('.template-card-preview iframe')
    previewIframes.forEach(function(iframe) {
      var id = iframe.getAttribute('data-id')
      if (id && cards.length > 0) {
        DataStore.getTemplateRender(id, cards[0].id).then(function(html) {
          iframe.srcdoc = html
        }).catch(function() {})
      }
    })
  }

  // Upload handler
  async function handleUpload(file) {
    var ext = file.name.split('.').pop().toLowerCase()
    if (ext !== 'html' && ext !== 'htm' && ext !== 'txt') {
      Admin.showToast('仅支持 .html / .txt 文件', 'error')
      return
    }
    if (file.size > 500 * 1024) {
      Admin.showToast('文件大小不能超过 500KB', 'error')
      return
    }
    try {
      var data = await DataStore.uploadTemplate(file)
      if (data && data.ok) {
        Admin.showToast('模板上传成功', 'success')
        Admin.track('template_upload', { filename: file.name })
        await loadData()
        render()
      } else {
        Admin.showToast((data && data.error) || '上传失败', 'error')
      }
    } catch (err) {
      Admin.showToast('上传失败，请重试', 'error')
    }
  }

  document.getElementById('templateFileInput').addEventListener('change', function(e) {
    var file = e.target.files[0]
    if (!file) return
    handleUpload(file)
    e.target.value = ''
  })

  // Preview in sandbox iframe
  window.previewTemplate = async function(id) {
    if (cards.length === 0) {
      Admin.showToast('暂无名片数据，请先创建名片', 'error')
      return
    }
    var firstCardId = cards[0].id
    var options = cards.map(function(c) {
      return '<option value="' + c.id + '">' + Admin._escapeHTML(c.name) + ' - ' + Admin._escapeHTML(c.title || '') + '</option>'
    }).join('')

    var overlay = document.createElement('div')
    overlay.className = 'template-preview-overlay'
    overlay.id = 'previewOverlay'
    overlay.innerHTML = `
      <div class="template-preview-modal">
        <div class="template-preview-header">
          <h3>模板预览</h3>
          <select id="previewCardSelect">${options}</select>
          <button class="btn btn-sm btn-outline" id="newWindowBtn">新窗口打开</button>
          <button class="btn btn-sm btn-secondary" onclick="closePreview()">关闭</button>
        </div>
        <div class="template-preview-body">
          <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin" srcdoc=""></iframe>
        </div>
      </div>`
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closePreview()
    })
    document.body.appendChild(overlay)

    // Load initial render
    try {
      var html = await DataStore.getTemplateRender(id, firstCardId)
      document.getElementById('previewFrame').srcdoc = html
    } catch (e) {
      document.getElementById('previewFrame').srcdoc = '<p>加载失败</p>'
    }

    // Card selector change
    document.getElementById('previewCardSelect').addEventListener('change', async function() {
      try {
        var html = await DataStore.getTemplateRender(id, parseInt(this.value))
        document.getElementById('previewFrame').srcdoc = html
      } catch (e) {
        document.getElementById('previewFrame').srcdoc = '<p>加载失败</p>'
      }
    })

    // New window button
    document.getElementById('newWindowBtn').addEventListener('click', function() {
      var sel = document.getElementById('previewCardSelect')
      var cardId = sel ? parseInt(sel.value) : firstCardId
      window.open('/api/templates/' + id + '/render?cardId=' + cardId, '_blank')
    })
  }

  // Open template render in new browser tab (bypasses iframe sandbox, works with Tailwind CDN)
  window.openInNewTab = function(id) {
    var cardId = cards.length > 0 ? cards[0].id : 0
    window.open('/api/templates/' + id + '/render?cardId=' + cardId, '_blank')
  }

  window.closePreview = function() {
    var overlay = document.getElementById('previewOverlay')
    if (overlay) overlay.remove()
  }

  // View source code
  window.viewSource = async function(id) {
    try {
      var data = await DataStore.getTemplateRaw(id)
      if (data && data.ok) {
        var overlay = document.createElement('div')
        overlay.className = 'template-preview-overlay'
        overlay.id = 'sourceOverlay'
        overlay.innerHTML = `
          <div class="template-preview-modal" style="max-width:640px">
            <div class="template-preview-header">
              <h3>源码预览 - ${Admin._escapeHTML(data.name)}</h3>
              <span class="badge badge-${data.mime_type === 'text/plain' ? 'info' : 'neutral'}">${data.mime_type === 'text/plain' ? 'TXT' : 'HTML'}</span>
              <button class="btn btn-sm btn-secondary" onclick="closeSource()">关闭</button>
            </div>
            <div class="code-preview-body">
              <pre><code>${Admin._escapeHTML(data.content)}</code></pre>
            </div>
          </div>`
        overlay.addEventListener('click', function(e) {
          if (e.target === overlay) closeSource()
        })
        document.body.appendChild(overlay)
      }
    } catch (e) {
      Admin.showToast('获取源码失败', 'error')
    }
  }

  window.closeSource = function() {
    var overlay = document.getElementById('sourceOverlay')
    if (overlay) overlay.remove()
  }

  // Download template
  window.downloadTemplate = async function(id) {
    try {
      var data = await DataStore.getTemplateRaw(id)
      if (data && data.ok) {
        var ext = data.mime_type === 'text/plain' ? '.txt' : '.html'
        var blob = new Blob([data.content], { type: data.mime_type + ';charset=utf-8' })
        var url = URL.createObjectURL(blob)
        var a = document.createElement('a')
        a.href = url
        a.download = data.name + ext
        document.body.appendChild(a)
        a.click()
        document.body.removeChild(a)
        URL.revokeObjectURL(url)
      }
    } catch (e) {
      Admin.showToast('下载失败', 'error')
    }
  }

  // Delete template
  window.deleteTemplate = function(id) {
    var tpl = templates.find(function(t) { return t.id === id })
    var name = tpl ? tpl.name : 'Template ' + id
    Admin.confirmDelete('确定删除模板「' + name + '」？关联此模板的名片将恢复为无模板状态。', async function() {
      try {
        var data = await DataStore.deleteTemplate(id)
        if (data && data.ok) {
          Admin.showToast('模板已删除', 'success')
          Admin.track('template_delete', { id: id })
          await loadData()
          render()
        } else {
          Admin.showToast((data && data.error) || '删除失败', 'error')
        }
      } catch (e) {
        Admin.showToast('删除失败，请重试', 'error')
      }
    })
  }

  await loadData()
  render()
})()
</script>
</body>
</html>
