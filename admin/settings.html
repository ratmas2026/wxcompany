<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>账号安全 - Admin Panel</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/data.js"></script>
<script src="js/common.js"></script>
</head>
<body>
<div id="app"></div>

<script>
(async function() {
  Admin.init('settings')
  Admin.track('page_view', { page: 'settings' })

  var state = {
    step: 'main',       // main | verify | code | password
    flow: '',           // 'changePwd' | 'changePhone' | 'changeEmail'
    verifyType: '',     // 'phone' | 'email'
    verifyTarget: '',   // unmasked phone/email
    maskedTarget: '',   // masked display
    codeTimer: null,
    code: ''
  }

  var bindings = {}

  async function loadBindings() {
    try { var d = await DataStore.getUserBindings(); if (d && d.bindings) bindings = d.bindings; } catch (e) {}
  }

  // ---- Breadcrumb ----
  function breadcrumb(items) {
    var parts = items.map(function(item, i) {
      if (i === items.length - 1) {
        return '<span class="breadcrumb-current">' + Admin._escapeHTML(item) + '</span>'
      }
      return '<a onclick="navStep(\'' + (i === 0 ? 'main' : (i === 1 ? 'verify' : 'code')) + '\')">' + Admin._escapeHTML(item) + '</a>'
    })
    return '<div class="breadcrumb">' + parts.join(' <span class="breadcrumb-sep">&gt;</span> ') + '</div>'
  }

  // ---- Navigation ----
  window.navStep = function(step) {
    if (state.codeTimer) { clearInterval(state.codeTimer); state.codeTimer = null }
    state.step = step
    state.code = ''
    render()
  }

  function startFlow(flow, verifyType) {
    state.flow = flow
    state.verifyType = verifyType
    state.verifyTarget = verifyType === 'phone' ? bindings.phone : bindings.email
    state.maskedTarget = verifyType === 'phone' ? (bindings.phoneMasked || bindings.phone) : (bindings.emailMasked || bindings.email)

    if (flow === 'changePwd') {
      state.step = 'verify'
    } else {
      // changePhone / changeEmail — go directly to binding flow
      state.step = 'verify'
    }
    render()
  }

  // ---- Step 1: Main ----
  function renderMain() {
    var pwdRow = '<div class="security-row">' +
      '<span class="security-row-label">设定密码</span>' +
      '<span class="security-row-value">已设定密码</span>' +
      '<button class="btn btn-outline" onclick="startFlow(\'changePwd\',\'' + (bindings.phone ? 'phone' : (bindings.email ? 'email' : 'phone')) + '\')">修改密码</button>' +
      '</div>'

    var phoneVal = bindings.phoneMasked || '未绑定'
    var phoneRow = '<div class="security-row">' +
      '<span class="security-row-label">绑定手机</span>' +
      '<span class="security-row-value">' + Admin._escapeHTML(phoneVal) + '</span>' +
      (bindings.phone ? '<button class="btn btn-outline" onclick="startFlow(\'changePhone\',\'phone\')">更换手机</button>' : '<button class="btn btn-outline" onclick="startFlow(\'changePhone\',\'phone\')">绑定手机</button>') +
      '</div>'

    var emailVal = bindings.emailMasked || '未绑定'
    var emailRow = '<div class="security-row">' +
      '<span class="security-row-label">绑定邮箱</span>' +
      '<span class="security-row-value">' + Admin._escapeHTML(emailVal) + '</span>' +
      (bindings.email ? '<button class="btn btn-outline" onclick="startFlow(\'changeEmail\',\'email\')">更换邮箱</button>' : '<button class="btn btn-outline" onclick="startFlow(\'changeEmail\',\'email\')">绑定邮箱</button>') +
      '</div>'

    return breadcrumb(['账号安全']) +
      '<div class="page-header"><h1>账号安全</h1></div>' +
      '<div class="card">' + pwdRow + phoneRow + emailRow + '</div>'
  }

  // ---- Step 2: Choose verification ----
  function renderVerify() {
    var options = ''
    if (bindings.phone) {
      options += '<div class="verify-option" onclick="startVerify(\'phone\')">' +
        '<span class="verify-option-icon">&#x1F4F1;</span>' +
        '<div><div class="verify-option-label">手机验证</div><div class="verify-option-detail">发送至 ' + Admin._escapeHTML(bindings.phoneMasked || bindings.phone) + '</div></div>' +
        '<span style="margin-left:auto;color:var(--on-surface-variant)">&#x203A;</span>' +
        '</div>'
    }
    if (bindings.email) {
      options += '<div class="verify-option" onclick="startVerify(\'email\')">' +
        '<span class="verify-option-icon">&#x2709;</span>' +
        '<div><div class="verify-option-label">邮箱验证</div><div class="verify-option-detail">发送至 ' + Admin._escapeHTML(bindings.emailMasked || bindings.email) + '</div></div>' +
        '<span style="margin-left:auto;color:var(--on-surface-variant)">&#x203A;</span>' +
        '</div>'
    }

    if (!options) {
      return breadcrumb(['账号安全']) +
        '<div class="step-header"><div class="step-title">无法验证身份</div>' +
        '<div class="step-desc">您尚未绑定手机号或邮箱，无法进行身份验证。<br>请先在账号安全主页绑定手机或邮箱后再修改密码。</div></div>' +
        '<button class="btn btn-outline" onclick="navStep(\'main\')">返回账号安全</button>'
    }

    return breadcrumb(['账号安全', '身份验证']) +
      '<div class="step-header"><div class="step-title">身份验证</div></div>' +
      '<div class="verify-options">' + options + '</div>' +
      '<div class="verify-hint">如您的原手机号及邮箱已无法使用，您可先 <a>找回账号</a> 再进行操作</div>'
  }

  window.startVerify = function(type) {
    state.verifyType = type
    state.verifyTarget = type === 'phone' ? bindings.phone : bindings.email
    state.maskedTarget = type === 'phone' ? (bindings.phoneMasked || bindings.phone) : (bindings.emailMasked || bindings.email)
    state.step = 'code'
    state.code = ''
    render()
    setTimeout(function() { sendVerifyCode() }, 300)
  }

  // ---- Step 3: Code input ----
  window.sendVerifyCode = async function() {
    var btn = document.getElementById('sendCodeBtn')
    if (!btn || btn.disabled) return
    btn.disabled = true
    var sec = 60
    btn.textContent = sec + 's'
    if (state.codeTimer) clearInterval(state.codeTimer)
    state.codeTimer = setInterval(function() {
      sec--
      if (sec <= 0) {
        clearInterval(state.codeTimer)
        state.codeTimer = null
        btn.disabled = false
        btn.textContent = '获取验证码'
      } else {
        btn.textContent = sec + 's'
      }
    }, 1000)

    try {
      var data = await DataStore.sendVerifyCode(state.verifyType)
      if (data && data.ok) {
        state.maskedTarget = data.masked || state.maskedTarget
        Admin.showToast('验证码已发送', 'success')
      } else {
        Admin.showToast((data && data.error) || '发送失败', 'error')
        clearInterval(state.codeTimer)
        state.codeTimer = null
        btn.disabled = false
        btn.textContent = '获取验证码'
      }
    } catch (e) {
      Admin.showToast('网络错误', 'error')
      clearInterval(state.codeTimer)
      state.codeTimer = null
      btn.disabled = false
      btn.textContent = '获取验证码'
    }
  }

  function renderCode() {
    var typeLabel = state.verifyType === 'phone' ? '手机验证' : '邮箱验证'
    var typeDesc = state.verifyType === 'phone'
      ? '验证码将通过短信形式发送至：' + Admin._escapeHTML(state.maskedTarget)
      : '验证码将通过邮件形式发送至：' + Admin._escapeHTML(state.maskedTarget)

    var boxes = ''
    for (var i = 0; i < 6; i++) {
      boxes += '<input class="code-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" id="codeBox' + i + '" oninput="onCodeInput(event,' + i + ')" onkeydown="onCodeKeydown(event,' + i + ')" onpaste="onCodePaste(event)">'
    }

    var nextDisabled = state.code.length < 6 ? 'disabled' : ''

    return breadcrumb(['账号安全', '身份验证', typeLabel]) +
      '<div class="step-header"><div class="step-title">' + typeLabel + '</div>' +
      '<div class="step-desc">为了您的账号安全，需要验证您的' + (state.verifyType === 'phone' ? '手机号码' : '邮箱') + '。<br>' + typeDesc + '</div></div>' +
      '<div class="code-boxes" id="codeBoxes">' + boxes + '</div>' +
      '<button class="btn btn-outline" id="sendCodeBtn" onclick="sendVerifyCode()">获取验证码</button>' +
      '<div class="step-actions">' +
        '<button class="btn btn-primary" id="codeNextBtn" ' + nextDisabled + ' onclick="submitCode()">下一步</button>' +
      '</div>'
  }

  // 6-box input handlers
  window.onCodeInput = function(e, idx) {
    var val = e.target.value.replace(/[^0-9]/g, '')
    e.target.value = val
    if (val && idx < 5) {
      var next = document.getElementById('codeBox' + (idx + 1))
      if (next) next.focus()
    }
    readCode()
  }

  window.onCodeKeydown = function(e, idx) {
    if (e.key === 'Backspace' && !e.target.value && idx > 0) {
      var prev = document.getElementById('codeBox' + (idx - 1))
      if (prev) { prev.focus(); prev.select() }
    }
  }

  window.onCodePaste = function(e) {
    e.preventDefault()
    var paste = (e.clipboardData || window.clipboardData).getData('text')
    var digits = paste.replace(/[^0-9]/g, '').slice(0, 6)
    for (var i = 0; i < 6; i++) {
      var box = document.getElementById('codeBox' + i)
      if (box) box.value = digits[i] || ''
    }
    var last = document.getElementById('codeBox' + Math.min(digits.length, 5))
    if (last) last.focus()
    readCode()
  }

  function readCode() {
    state.code = ''
    for (var i = 0; i < 6; i++) {
      var box = document.getElementById('codeBox' + i)
      if (box) state.code += box.value || ''
    }
    var btn = document.getElementById('codeNextBtn')
    if (btn) {
      btn.disabled = state.code.length < 6
    }
    // Clear error states
    document.querySelectorAll('.code-box--error').forEach(function(b) { b.classList.remove('code-box--error') })
  }

  window.submitCode = async function() {
    if (state.code.length < 6) return
    var btn = document.getElementById('codeNextBtn')
    btn.disabled = true
    btn.textContent = '验证中...'

    // For changePwd flow, verify via verifyCode endpoint
    // For changePhone/changeEmail, verify via verifyBind endpoint
    try {
      if (state.flow === 'changePwd') {
        var data = await DataStore.verifyCode(state.verifyType, state.code)
      } else {
        var data = await DataStore.verifyBind(state.verifyType, state.verifyTarget, state.code)
      }
      if (data && data.ok) {
        if (state.flow === 'changePwd') {
          state.step = 'password'
          render()
        } else {
          Admin.showToast((state.verifyType === 'phone' ? '手机号' : '邮箱') + '验证成功', 'success')
          // After verification for changePhone/changeEmail, go to input new value
          showChangeInput()
        }
      } else {
        markCodeError()
        Admin.showToast((data && data.error) || '验证码错误', 'error')
      }
    } catch (e) {
      Admin.showToast('网络错误', 'error')
    } finally {
      btn.disabled = false
      btn.textContent = '下一步'
    }
  }

  function markCodeError() {
    document.querySelectorAll('.code-box').forEach(function(b) { b.classList.add('code-box--error') })
    state.code = ''
    document.querySelectorAll('.code-box').forEach(function(b) { b.value = '' })
    var first = document.getElementById('codeBox0')
    if (first) first.focus()
    var nextBtn = document.getElementById('codeNextBtn')
    if (nextBtn) nextBtn.disabled = true
  }

  function showChangeInput() {
    state.step = 'bind'
    render()
  }

  // ---- Change phone/email form (after verification) ----
  function renderBind() {
    var label = state.verifyType === 'phone' ? '更换手机' : '更换邮箱'
    var inputType = state.verifyType === 'phone' ? 'tel' : 'email'
    var placeholder = state.verifyType === 'phone' ? '请输入新手机号' : '请输入新邮箱'

    return breadcrumb(['账号安全', label]) +
      '<div class="step-header"><div class="step-title">' + label + '</div></div>' +
      '<div class="card" style="max-width:480px">' +
        '<div class="form-group">' +
          '<label class="form-label">' + (state.verifyType === 'phone' ? '新手机号' : '新邮箱') + '</label>' +
          '<input class="form-input" type="' + inputType + '" id="newBindValue" placeholder="' + placeholder + '" maxlength="' + (state.verifyType === 'phone' ? '11' : '64') + '">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">验证码</label>' +
          '<div style="display:flex;gap:8px">' +
            '<input class="form-input" type="text" id="newBindCode" placeholder="6位验证码" maxlength="6" style="flex:1">' +
            '<button class="btn btn-outline" id="newBindSendBtn" onclick="sendNewBindCode()" style="flex-shrink:0">获取验证码</button>' +
          '</div>' +
        '</div>' +
        '<button class="btn btn-primary" style="width:100%;justify-content:center" id="newBindSubmit" onclick="submitNewBind()">确认更换</button>' +
      '</div>'
  }

  var newBindTimer = null

  window.sendNewBindCode = async function() {
    var input = document.getElementById('newBindValue')
    var btn = document.getElementById('newBindSendBtn')
    var value = input ? input.value.trim() : ''
    if (!value) { Admin.showToast('请输入' + (state.verifyType === 'phone' ? '手机号' : '邮箱'), 'error'); return }
    if (state.verifyType === 'phone' && !/^1\d{10}$/.test(value)) { Admin.showToast('请输入正确的11位手机号', 'error'); return }
    if (state.verifyType === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) { Admin.showToast('请输入正确的邮箱地址', 'error'); return }

    btn.disabled = true
    var sec = 60
    btn.textContent = sec + 's'
    if (newBindTimer) clearInterval(newBindTimer)
    newBindTimer = setInterval(function() {
      sec--
      if (sec <= 0) { clearInterval(newBindTimer); newBindTimer = null; btn.disabled = false; btn.textContent = '获取验证码' }
      else { btn.textContent = sec + 's' }
    }, 1000)

    try {
      var data = await DataStore.sendBindCode(state.verifyType, value)
      if (!data || !data.ok) {
        Admin.showToast((data && data.error) || '发送失败', 'error')
        clearInterval(newBindTimer); newBindTimer = null; btn.disabled = false; btn.textContent = '获取验证码'
      } else {
        Admin.showToast('验证码已发送', 'success')
      }
    } catch (e) {
      Admin.showToast('网络错误', 'error')
      clearInterval(newBindTimer); newBindTimer = null; btn.disabled = false; btn.textContent = '获取验证码'
    }
  }

  window.submitNewBind = async function() {
    var value = document.getElementById('newBindValue').value.trim()
    var code = document.getElementById('newBindCode').value.trim()
    if (!value || !code) { Admin.showToast('请填写完整', 'error'); return }

    var btn = document.getElementById('newBindSubmit')
    btn.disabled = true
    btn.textContent = '提交中...'
    try {
      var data = await DataStore.verifyBind(state.verifyType, value, code)
      if (data && data.ok) {
        Admin.showToast((state.verifyType === 'phone' ? '手机号' : '邮箱') + '更换成功', 'success')
        Admin.track('bind_change_' + state.verifyType)
        await loadBindings()
        state.step = 'main'
        render()
      } else {
        Admin.showToast((data && data.error) || '更换失败', 'error')
      }
    } catch (e) {
      Admin.showToast('网络错误', 'error')
    } finally {
      btn.disabled = false
      btn.textContent = '确认更换'
    }
  }

  // ---- Step 4: New Password ----
  function renderPassword() {
    return breadcrumb(['账号安全', '身份验证', '新密码设置']) +
      '<div class="step-header"><div class="step-title">新密码设置</div></div>' +
      '<div class="card" style="max-width:480px">' +
        '<div class="form-group">' +
          '<label class="form-label">请输入新密码</label>' +
          '<input class="form-input" type="password" id="newPwd" placeholder="8-16位，至少两种类型" maxlength="16" oninput="checkPwdStrength()">' +
          '<div class="form-hint" id="pwdHint" style="color:var(--on-surface-variant)">密码可由数字、大写英文字母、小写英文字母、特殊字符组成，至少包含两种类型，长度要求8-16位字符。</div>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">再次输入新密码</label>' +
          '<input class="form-input" type="password" id="confirmPwd" placeholder="再次输入新密码" maxlength="16" oninput="checkPwdStrength()">' +
        '</div>' +
        '<button class="btn btn-primary" style="width:100%;justify-content:center" id="pwdNextBtn" disabled onclick="submitNewPassword()">下一步</button>' +
      '</div>'
  }

  window.checkPwdStrength = function() {
    var pwd = document.getElementById('newPwd').value
    var confirm = document.getElementById('confirmPwd').value
    var hint = document.getElementById('pwdHint')
    var btn = document.getElementById('pwdNextBtn')

    var valid = true
    var errors = []

    if (pwd.length < 8 || pwd.length > 16) { valid = false; errors.push('长度需为8-16位') }
    var types = 0
    if (/[a-z]/.test(pwd)) types++
    if (/[A-Z]/.test(pwd)) types++
    if (/\d/.test(pwd)) types++
    if (/[^a-zA-Z0-9]/.test(pwd)) types++
    if (types < 2) { valid = false; errors.push('至少包含两种类型（大小写字母、数字、特殊字符）') }
    if (confirm && pwd !== confirm) { valid = false; errors.push('两次密码输入不一致') }

    if (errors.length > 0 && pwd.length > 0) {
      hint.style.color = 'var(--error)'
      hint.textContent = errors.join('；')
    } else if (pwd.length > 0) {
      hint.style.color = 'var(--success, #16a34a)'
      hint.textContent = '密码强度符合要求'
    } else {
      hint.style.color = 'var(--on-surface-variant)'
      hint.textContent = '密码可由数字、大写英文字母、小写英文字母、特殊字符组成，至少包含两种类型，长度要求8-16位字符。'
    }

    btn.disabled = !valid
  }

  window.submitNewPassword = async function() {
    var pwd = document.getElementById('newPwd').value
    var confirm = document.getElementById('confirmPwd').value
    if (pwd !== confirm) { Admin.showToast('两次密码不一致', 'error'); return }

    var btn = document.getElementById('pwdNextBtn')
    btn.disabled = true
    btn.textContent = '提交中...'
    try {
      var data = await DataStore.changePassword(state.code, state.verifyTarget, pwd)
      if (data && data.ok) {
        Admin.showToast('密码修改成功', 'success')
        Admin.track('password_changed')
        state.step = 'main'
        render()
      } else {
        Admin.showToast((data && data.error) || '修改失败', 'error')
      }
    } catch (e) {
      Admin.showToast('网络错误', 'error')
    } finally {
      btn.disabled = false
      btn.textContent = '下一步'
    }
  }

  // ---- Main render ----
  function render() {
    if (state.codeTimer) { clearInterval(state.codeTimer); state.codeTimer = null }
    var html = ''
    switch (state.step) {
      case 'main': html = renderMain(); break
      case 'verify': html = renderVerify(); break
      case 'code': html = renderCode(); break
      case 'password': html = renderPassword(); break
      case 'bind': html = renderBind(); break
    }
    Admin.setPageContent(html)
  }

  await loadBindings()
  render()
})()
</script>
</body>
</html>
