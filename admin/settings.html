<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>账号设置 - Admin Panel</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/data.js"></script>
<script src="js/common.js"></script>
</head>
<body>
<div id="app"></div>

<script>
(async function() {
  Admin.init('settings')
  Admin.track('page_view', { page: 'settings' })

  function renderPasswordSection() {
    return `
      <div class="card" style="max-width:520px">
        <div class="settings-section-title">修改密码</div>
        <div class="form-group">
          <label class="form-label">旧密码</label>
          <input class="form-input" type="password" id="oldPassword" placeholder="请输入旧密码">
        </div>
        <div class="form-group">
          <label class="form-label">新密码</label>
          <input class="form-input" type="password" id="newPassword" placeholder="至少8位，含字母和数字" oninput="updateStrength()">
          <div class="password-strength" id="strengthBar" style="width:0"></div>
          <div class="form-hint" id="strengthText"></div>
        </div>
        <div class="form-group">
          <label class="form-label">确认新密码</label>
          <input class="form-input" type="password" id="confirmPassword" placeholder="再次输入新密码">
        </div>
        <button class="btn btn-primary" id="changePwdBtn" style="width:100%;justify-content:center" onclick="changePassword()">修改密码</button>
      </div>
    `
  }

  function renderSessionsSection(sessions) {
    if (!sessions || sessions.length === 0) {
      return `
        <div class="card" style="max-width:520px">
          <div class="settings-section-title">登录设备</div>
          <div class="empty-state"><p>暂无其他登录设备</p></div>
        </div>
      `
    }
    const rows = sessions.map(s => `
      <tr>
        <td>${Admin._escapeHTML(s.device || '未知设备')}</td>
        <td>${Admin._escapeHTML(s.ip || '-')}</td>
        <td>${Admin._escapeHTML(s.loginTime || '-')}</td>
        <td>${s.isCurrent ? '<span class="tag-current">当前设备</span>' : ''}</td>
        <td>${s.isCurrent ? '' : '<button class="btn btn-sm btn-outline" onclick="kickSession(' + s.id + ')" style="color:var(--error);border-color:var(--error)">强制下线</button>'}</td>
      </tr>
    `).join('')
    return `
      <div class="card" style="max-width:720px">
        <div class="settings-section-title">登录设备</div>
        <div class="table-wrap">
          <table class="settings-table">
            <thead><tr><th>设备</th><th>IP</th><th>登录时间</th><th></th><th>操作</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `
  }

  function renderBindingsSection(bindings) {
    const items = [
      { key: 'phone', label: '手机号', value: (bindings && bindings.phone) || '', supported: true },
      { key: 'email', label: '邮箱', value: (bindings && bindings.email) || '', supported: true },
      { key: 'wechat', label: '微信', value: (bindings && bindings.wechat) || '', supported: false }
    ]
    const rows = items.map(b => {
      let statusHTML
      if (!b.supported) {
        statusHTML = '<span class="bind-status bind-status--unsupported">暂不支持</span>'
      } else if (b.value) {
        statusHTML = '<span class="bind-status bind-status--bound">已绑定</span> ' + Admin._escapeHTML(b.value)
      } else {
        statusHTML = '<span class="bind-status bind-status--unbound">未绑定</span>'
      }
      return `<tr><td style="font-weight:600">${b.label}</td><td>${statusHTML}</td></tr>`
    }).join('')
    return `
      <div class="card" style="max-width:520px">
        <div class="settings-section-title">绑定状态</div>
        <div class="table-wrap">
          <table class="settings-table">
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `
  }

  function render() {
    Admin.setPageContent(`
      <div class="page-header"><h1>账号设置</h1></div>
      ${renderPasswordSection()}
      <div id="sessionsArea"></div>
      <div id="bindingsArea"></div>
    `)
    loadSessions()
    loadBindings()
  }

  window.updateStrength = function() {
    const pwd = document.getElementById('newPassword').value
    const bar = document.getElementById('strengthBar')
    const txt = document.getElementById('strengthText')
    if (!bar || !txt) return
    bar.className = 'password-strength'
    let score = 0
    if (pwd.length >= 8) score++
    if (/[a-zA-Z]/.test(pwd) && /\d/.test(pwd)) score++
    if (/[^a-zA-Z0-9]/.test(pwd)) score++
    if (pwd.length >= 12) score++
    const levels = [
      { w: 0, c: '', t: '' },
      { w: 33, c: 'password-strength--weak', t: '弱' },
      { w: 66, c: 'password-strength--medium', t: '中' },
      { w: 100, c: 'password-strength--strong', t: '强' },
      { w: 100, c: 'password-strength--strong', t: '强' }
    ]
    const lv = levels[Math.min(score, 4)]
    bar.style.width = lv.w + '%'
    if (lv.c) bar.classList.add(lv.c)
    txt.textContent = lv.t || '请输入至少8位密码'
  }

  window.changePassword = async function() {
    const oldPwd = document.getElementById('oldPassword').value
    const newPwd = document.getElementById('newPassword').value
    const confirmPwd = document.getElementById('confirmPassword').value
    if (!oldPwd) { Admin.showToast('请输入旧密码', 'error'); return }
    if (!newPwd || newPwd.length < 8) { Admin.showToast('新密码至少8位', 'error'); return }
    if (newPwd !== confirmPwd) { Admin.showToast('两次密码不一致', 'error'); return }
    const btn = document.getElementById('changePwdBtn')
    btn.disabled = true
    btn.textContent = '提交中...'
    try {
      const data = await DataStore.changePassword(oldPwd, newPwd)
      if (data && data.ok) {
        Admin.showToast('密码修改成功', 'success')
        Admin.track('password_changed')
        document.getElementById('oldPassword').value = ''
        document.getElementById('newPassword').value = ''
        document.getElementById('confirmPassword').value = ''
        document.getElementById('strengthBar').style.width = '0'
        document.getElementById('strengthBar').className = 'password-strength'
        document.getElementById('strengthText').textContent = ''
        if (data.kicked) {
          setTimeout(() => { sessionStorage.removeItem('admin_token'); window.location.href = 'login.html' }, 1500)
        }
      } else {
        Admin.showToast((data && data.error) || '修改失败，请检查旧密码', 'error')
      }
    } catch (e) {
      Admin.showToast('网络错误，请重试', 'error')
    } finally {
      btn.disabled = false
      btn.textContent = '修改密码'
    }
  }

  window.kickSession = async function(id) {
    Admin.showModal('强制下线', '<p>确认将该设备强制下线？</p>', async function() {
      try {
        const data = await DataStore.deleteSession(id)
        if (data && data.ok) {
          Admin.showToast('已下线', 'success')
          loadSessions()
        } else {
          Admin.showToast('操作失败', 'error')
        }
      } catch (e) {
        Admin.showToast('网络错误', 'error')
      }
    }, '确认下线', true)
  }

  async function loadSessions() {
    const area = document.getElementById('sessionsArea')
    if (!area) return
    try {
      const data = await DataStore.getUserSessions()
      area.innerHTML = renderSessionsSection((data && data.sessions) || [])
    } catch (e) {
      area.innerHTML = renderSessionsSection([])
    }
  }

  async function loadBindings() {
    const area = document.getElementById('bindingsArea')
    if (!area) return
    try {
      const data = await DataStore.getUserBindings()
      area.innerHTML = renderBindingsSection((data && data.bindings) || {})
    } catch (e) {
      area.innerHTML = renderBindingsSection({})
    }
  }

  render()
})()
</script>
</body>
</html>
