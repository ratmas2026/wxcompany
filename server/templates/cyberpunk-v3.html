<style>
  @keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:0.8}94%{opacity:1}96%{opacity:0.7}97%{opacity:1}}
  .status-circle{animation:spin-slow 8s linear infinite;transform-origin:center center}
  .neon-text{font-family:'Orbitron',system-ui,sans-serif;color:#ff4d4d;text-shadow:0 0 2px #f00,0 0 5px rgba(255,0,0,.8),0 0 10px rgba(255,0,0,.4);-webkit-text-stroke:0.2px rgba(0,0,0,.3)}
  .neon-flicker{animation:flicker 3s linear infinite}
  .scanline-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,.08),rgba(0,0,0,.08) 1px,transparent 1px,transparent 2px);pointer-events:none;z-index:50}
</style>
<div style="position:relative;width:100%;max-width:1000px;aspect-ratio:16/9;margin:0 auto;background:#0a0a0a;color:#e0e0e0;font-family:'Orbitron',system-ui,sans-serif;overflow:hidden;border-radius:12px;border:2px solid rgba(255,255,255,.1)">

  <!-- BACKGROUND: red underlay makes SVG transparent gaps (decorations) visible -->
  <div style="position:absolute;inset:0;z-index:0;background:rgba(255,30,30,.12)"></div>
  <!-- SVG: black paths block the red underlay, transparent gaps show as red decorations -->
  <img src="/cyber.svg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;pointer-events:none" alt="">

  <!-- SECTION 1: Company Name (top 0-33%) -->
  <div style="position:absolute;top:0;left:0;width:100%;height:33.333%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(0,0,0,.3)">
    <div class="neon-text" style="font-size:clamp(26px,4vw,52px);font-weight:900;letter-spacing:.15em;text-transform:uppercase;text-align:center;padding:0 40px;white-space:nowrap">{{company.name}}</div>
  </div>

  <!-- SECTION 2: Name & Title (middle 33-66%) -->
  <div style="position:absolute;top:33.333%;left:0;width:100%;height:33.333%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(0,0,0,.35)">
    <div class="neon-text" style="font-size:clamp(36px,6vw,64px);font-weight:900;letter-spacing:.1em;text-transform:uppercase;text-align:center;padding:0 60px">{{user.name}}</div>
    <div style="font-size:clamp(16px,2.5vw,24px);color:#ff4d4d;letter-spacing:.3em;text-transform:uppercase;margin-top:8px;font-weight:500;text-shadow:0 0 2px rgba(255,0,0,.6)">{{user.title}}</div>
  </div>

  <!-- SECTION 3: Contact Info (bottom 66-100%) -->
  <div style="position:absolute;top:66.666%;left:0;width:100%;height:33.333%;z-index:10;background:rgba(0,0,0,.3);display:flex">

    <!-- Left: Address -->
    <div style="flex:1;display:flex;align-items:flex-start;justify-content:center;flex-direction:column;padding:0 5% 0 6%">
      <div style="font-size:clamp(12px,1.8vw,16px);color:#ff4d4d;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;opacity:.8;text-shadow:0 0 2px rgba(255,0,0,.3)">Address</div>
      <div style="font-size:clamp(11px,1.6vw,16px);color:#ff4d4d;letter-spacing:.05em;line-height:1.5">{{user.address}}</div>
    </div>

    <!-- Center: Contact -->
    <div style="flex:1;display:flex;align-items:flex-start;justify-content:center;flex-direction:column;padding:0 3%">
      <div style="font-size:clamp(12px,1.8vw,16px);color:#ff4d4d;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;opacity:.8;text-shadow:0 0 2px rgba(255,0,0,.3)">Contact</div>
      <div style="font-size:clamp(11px,1.6vw,16px);color:#ff4d4d;line-height:1.6">{{user.phone}}</div>
      <div style="font-size:clamp(11px,1.6vw,16px);color:#ff4d4d;line-height:1.6">{{user.email}}</div>
    </div>
  </div>

  <!-- Scanline overlay -->
  <div class="scanline-overlay"></div>

  <!-- Rotating dashed circle (bottom-right) -->
  <div style="position:absolute;bottom:30px;right:30px;width:48px;height:48px;z-index:60">
    <svg xmlns="http://www.w3.org/2000/svg" class="status-circle" viewBox="0 0 100 100" style="width:100%;height:100%;filter:drop-shadow(0 0 3px rgba(255,0,0,.5))">
      <circle cx="50" cy="50" fill="none" r="22.5" stroke="#ff3e3e" stroke-dasharray="10 4" stroke-width="3"></circle>
    </svg>
  </div>

</div>
