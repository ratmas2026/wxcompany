<style>
  @keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:0.8}94%{opacity:1}96%{opacity:0.7}97%{opacity:1}}
  .status-circle{animation:spin-slow 8s linear infinite;transform-origin:center center}
  .neon-text{font-family:'Orbitron',system-ui,sans-serif;color:rgb(255,146,124);text-shadow:0 0 2px rgb(250,126,105),0 0 5px rgba(250,90,60,.8),0 0 10px rgba(200,55,40,.4);-webkit-text-stroke:0.2px rgba(0,0,0,.3)}
  .neon-flicker{animation:flicker 3s linear infinite}
  .coral-band{position:absolute;z-index:1;pointer-events:none;background:linear-gradient(180deg,rgb(159,24,22) 0%,rgb(250,126,105) 45%,rgb(255,146,124) 100%)}
  .scanline-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,.08),rgba(0,0,0,.08) 1px,transparent 1px,transparent 2px);pointer-events:none;z-index:50}
</style>
<div style="position:relative;width:100%;max-width:1000px;aspect-ratio:16/9;margin:0 auto;background:rgb(6,12,13);color:#e0e0e0;font-family:'Orbitron',system-ui,sans-serif;overflow:hidden;border-radius:12px;border:2px solid rgba(255,255,255,.1)">

  <!-- CORAL BANDS: exact positions from pixel analysis of original cyber.png -->

  <!-- Zone B (8.1%-14%): wide top band, full-width -->
  <div class="coral-band" style="top:8.1%;width:100%;height:5.9%;left:0"></div>

  <!-- Zone C (14%-25%): warm-to-dark transition gradient -->
  <div style="position:absolute;top:14%;left:0;width:100%;height:11%;z-index:1;pointer-events:none;background:linear-gradient(180deg,rgba(250,126,105,.45) 0%,rgba(250,126,105,.06) 100%)"></div>

  <!-- Zone E (38.1%-47.5%): centered middle band -->
  <div class="coral-band" style="top:38.1%;left:30.3%;width:39.4%;height:9.4%;opacity:.92"></div>

  <!-- Zone F (47.6%-53.8%): narrow centered band below E -->
  <div class="coral-band" style="top:47.6%;left:30.4%;width:39.2%;height:6.2%;opacity:.95"></div>

  <!-- Zone H1 (70.2%-74.5%): bottom left-aligned band -->
  <div class="coral-band" style="top:70.2%;left:5.6%;width:58.8%;height:4.3%;opacity:.90"></div>

  <!-- Zone H2 (76.5%-80.8%): bottom full-width band -->
  <div class="coral-band" style="top:76.5%;left:0;width:100%;height:4.3%;opacity:.85"></div>

  <!-- Zone H3 (85.5%-90.0%): bottom second full-width band -->
  <div class="coral-band" style="top:85.5%;left:0;width:100%;height:4.5%;opacity:.88"></div>

  <!-- GRAY DECORATIVE LINES: inline SVG mapped to pixel coordinates -->
  <svg style="position:absolute;inset:0;width:100%;height:100%;z-index:5;pointer-events:none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1664 928" preserveAspectRatio="none">
    <line x1="55" y1="20" x2="55" y2="900" stroke="rgb(100,105,108)" stroke-width="2" stroke-opacity="0.6"/>
    <line x1="311" y1="247" x2="187" y2="370" stroke="rgb(120,125,128)" stroke-width="1.5" stroke-opacity="0.5"/>
  </svg>

  <!-- SECTION 1: Company Name (top 0-20%) -->
  <div style="position:absolute;top:0;left:0;width:100%;height:20%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(6,12,13,.45)">
    <div class="neon-text" style="font-size:clamp(24px,3.8vw,48px);font-weight:900;letter-spacing:.15em;text-transform:uppercase;text-align:center;padding:0 40px;white-space:nowrap">{{company.name}}</div>
  </div>

  <!-- SECTION 2: Name & Title (top 25-53%) — lighter bg lets centered coral bands E/F show through -->
  <div style="position:absolute;top:25%;left:0;width:100%;height:28%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(6,12,13,.35)">
    <div class="neon-text" style="font-size:clamp(34px,5.5vw,60px);font-weight:900;letter-spacing:.1em;text-transform:uppercase;text-align:center;padding:0 50px">{{user.name}}</div>
    <div style="font-size:clamp(15px,2.3vw,22px);color:rgb(250,126,105);letter-spacing:.3em;text-transform:uppercase;margin-top:6px;font-weight:500;text-shadow:0 0 2px rgba(250,90,60,.6)">{{user.title}}</div>
  </div>

  <!-- SECTION 3: Contact Info (top 53-100%) — darker bg for legibility over bottom bands -->
  <div style="position:absolute;top:53%;left:0;width:100%;height:47%;z-index:20;background:rgba(6,12,13,.5);display:flex">

    <!-- Left: Address -->
    <div style="flex:1;display:flex;align-items:flex-start;justify-content:center;flex-direction:column;padding:0 5% 0 6%">
      <div style="font-size:clamp(11px,1.6vw,15px);color:rgb(250,126,105);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;opacity:.8;text-shadow:0 0 2px rgba(250,90,60,.3)">Address</div>
      <div style="font-size:clamp(10px,1.5vw,15px);color:rgb(255,146,124);letter-spacing:.05em;line-height:1.5">{{user.address}}</div>
    </div>

    <!-- Center: Contact -->
    <div style="flex:1;display:flex;align-items:flex-start;justify-content:center;flex-direction:column;padding:0 3%">
      <div style="font-size:clamp(11px,1.6vw,15px);color:rgb(250,126,105);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;opacity:.8;text-shadow:0 0 2px rgba(250,90,60,.3)">Contact</div>
      <div style="font-size:clamp(10px,1.5vw,15px);color:rgb(255,146,124);line-height:1.6">{{user.phone}}</div>
      <div style="font-size:clamp(10px,1.5vw,15px);color:rgb(255,146,124);line-height:1.6">{{user.email}}</div>
    </div>
  </div>

  <!-- cyber.svg fine-detail texture overlay — .06 opacity, multiply blend avoids stencil inversion -->
  <img src="/cyber.svg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:30;pointer-events:none;opacity:.06;mix-blend-mode:multiply" alt="">

  <!-- Scanline overlay -->
  <div class="scanline-overlay"></div>

  <!-- Rotating dashed circle (bottom-right) -->
  <div style="position:absolute;bottom:30px;right:30px;width:48px;height:48px;z-index:60">
    <svg xmlns="http://www.w3.org/2000/svg" class="status-circle" viewBox="0 0 100 100" style="width:100%;height:100%;filter:drop-shadow(0 0 3px rgba(255,0,0,.5))">
      <circle cx="50" cy="50" fill="none" r="22.5" stroke="rgb(255,146,124)" stroke-dasharray="10 4" stroke-width="3"></circle>
    </svg>
  </div>

</div>
